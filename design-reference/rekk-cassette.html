<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>rekk — cassette</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Press+Start+2P&family=IBM+Plex+Mono:wght@400;500;600&family=Special+Elite&family=Permanent+Marker&display=swap" rel="stylesheet" />

<style>
  :root{
    /* LCD phosphor */
    --lcd-bg:#0c1a10;
    --lcd-bg-deep:#06100a;
    --lcd-fg:#7dff9a;
    --lcd-fg-bright:#d4ffd6;
    --lcd-dim:#2a6a3a;
    --lcd-dimmer:#143a20;
    --lcd-glow-rgb:125,255,154;

    /* Cassette plastic */
    --case:#1a1a1c;
    --case-light:#2a2a2c;
    --case-edge:#050506;
    --case-shine:rgba(255,255,255,.06);
    --tape:#1a0a06;
    --tape-ring:#3a1a0c;
    --tape-ring-2:#4a2412;
    --label:#f4ead0;
    --label-ink:#1a1410;
    --label-accent:#c9322d;
  }

  *,*::before,*::after{box-sizing:border-box}
  html,body{height:100%;margin:0;overflow:hidden;background:#0a0a0c}
  body{
    font-family:'IBM Plex Mono',ui-monospace,monospace;
    color:#cfd1d4;
    background:
      radial-gradient(ellipse at 50% 30%, #1a1c20 0%, #0b0c0e 60%, #050506 100%);
    -webkit-font-smoothing:antialiased;
  }

  /* ── stage ── */
  .stage{
    position:fixed;inset:0;
    display:grid;place-items:center;
    padding:20px;
  }
  .stage::before{
    content:"";position:absolute;inset:0;pointer-events:none;
    background:
      radial-gradient(ellipse 60vw 25vh at 50% 70%, rgba(0,0,0,.5), transparent 70%),
      repeating-linear-gradient(45deg, rgba(255,255,255,.008) 0 2px, transparent 2px 4px);
  }

  .device{
    position:relative;z-index:2;
    display:flex;flex-direction:column;
    align-items:center;gap:14px;
    width:min(680px, 92vw, calc((100vh - 260px) * 1.56));
  }

  /* ── top bar: brand + power led ── */
  .topbar{
    width:100%;
    display:flex;align-items:center;justify-content:space-between;
    color:#7a7a7c;font-family:'IBM Plex Mono',monospace;
    font-size:11px;letter-spacing:.12em;text-transform:uppercase;
  }
  .topbar .led{
    display:inline-flex;align-items:center;gap:6px;
  }
  .topbar .led .dot{
    width:8px;height:8px;border-radius:50%;
    background:#ff5c5c;box-shadow:0 0 4px #ff5c5c, 0 0 10px #ff5c5c;
  }
  .state-idle .topbar .led .dot{background:#3a3a3c;box-shadow:none}
  .state-paused .topbar .led .dot{background:#ffb84d;box-shadow:0 0 4px #ffb84d}
  .brandbig{
    font-family:'Press Start 2P',monospace;font-size:14px;color:#cfd1d4;letter-spacing:.06em;
  }
  .brandbig sub{font-size:9px;color:#7a7a7c;margin-left:6px;letter-spacing:.12em}

  /* ── counter (LCD strip, separate from cassette) ── */
  .counter{
    width:100%;
    background:linear-gradient(180deg,#1a1a1c 0%,#0a0a0c 100%);
    border:1px solid #000;
    border-radius:6px;
    padding:6px;
    display:grid;
    grid-template-columns:auto 1fr auto;
    gap:8px;
    align-items:stretch;
    box-shadow:
      0 1px 0 rgba(255,255,255,.05) inset,
      0 -1px 0 rgba(0,0,0,.5) inset,
      0 4px 12px -4px rgba(0,0,0,.6);
  }
  .counter-brand{
    display:flex;flex-direction:column;justify-content:center;
    padding:0 10px 0 6px;
    color:#a0a0a2;
    font-family:'Press Start 2P',monospace;font-size:9px;
    letter-spacing:.08em;line-height:1.4;
    border-right:1px solid #2a2a2c;
  }
  .counter-brand small{font-family:'IBM Plex Mono',monospace;font-size:8px;color:#5a5a5c;letter-spacing:.16em;font-weight:normal}

  .lcd{
    position:relative;
    background:linear-gradient(180deg, var(--lcd-bg-deep) 0%, var(--lcd-bg) 100%);
    border:1px solid #000;
    border-radius:3px;
    padding:5px 10px;
    color:var(--lcd-fg);
    font-family:'VT323','IBM Plex Mono',monospace;
    box-shadow:
      0 0 0 1px rgba(255,255,255,.05) inset,
      0 1px 2px rgba(0,0,0,.6) inset;
    overflow:hidden;
    display:grid;
    grid-template-columns:auto 1fr auto;
    gap:14px;
    align-items:center;
  }
  .lcd::before{
    content:"";position:absolute;inset:0;pointer-events:none;
    background:repeating-linear-gradient(to bottom, transparent 0 2px, rgba(0,0,0,.22) 2px 3px);
    mix-blend-mode:multiply;
  }
  .lcd::after{
    content:"";position:absolute;inset:0;pointer-events:none;
    background:radial-gradient(ellipse at 50% 50%, transparent 65%, rgba(0,0,0,.4) 100%);
  }
  .lcd-time{
    font-family:'Press Start 2P',monospace;
    font-size:clamp(14px, 2.2vw, 24px);
    color:var(--lcd-fg-bright);
    letter-spacing:.04em;
    line-height:1;
    text-shadow:
      0 0 1px currentColor,
      0 0 6px rgba(var(--lcd-glow-rgb),.7),
      0 0 16px rgba(var(--lcd-glow-rgb),.32);
    position:relative;z-index:2;
  }
  .lcd-time .ms{font-family:'VT323',monospace;font-size:.6em;color:var(--lcd-fg);opacity:.85;margin-left:.2em}

  .lcd-mid{
    position:relative;z-index:2;
    display:flex;flex-direction:column;gap:2px;
    min-width:0;
  }
  .lcd-mid pre{
    margin:0;font-family:inherit;
    font-size:clamp(8px, 1.0vw, 12px);
    line-height:1;color:var(--lcd-fg-bright);
    white-space:pre;overflow:hidden;
    text-shadow:0 0 4px rgba(var(--lcd-glow-rgb),.5);
  }
  .lcd-mid .meter{
    display:flex;align-items:center;gap:6px;
    font-variant-numeric:tabular-nums;
    font-size:clamp(10px, 1.2vw, 13px);
    color:var(--lcd-dim);
  }
  .lcd-mid .meter .bars{letter-spacing:0;color:var(--lcd-dimmer)}
  .lcd-mid .meter .bars .on{color:var(--lcd-fg-bright)}
  .lcd-mid .meter .bars .mid{color:#ffd86b}
  .lcd-mid .meter .bars .hot{color:#ff5c5c}
  .lcd-mid .meter .db{color:var(--lcd-fg);min-width:3.4em;text-align:right}

  .lcd-right{
    position:relative;z-index:2;
    display:flex;flex-direction:column;align-items:flex-end;gap:3px;
    font-size:clamp(10px,1.2vw,13px);
    line-height:1;
  }
  .lcd-right .state{
    display:flex;align-items:center;gap:5px;
    color:var(--lcd-fg-bright);letter-spacing:.1em;
  }
  .recdot{
    display:inline-block;width:.7em;height:.7em;border-radius:50%;
    background:#ff5c5c;box-shadow:0 0 4px #ff5c5c,0 0 10px #ff5c5c;
  }
  .state-rec .recdot{animation:pulse 1s infinite}
  .state-paused .recdot{background:#ffb84d;box-shadow:0 0 4px #ffb84d}
  .state-idle .recdot{background:var(--lcd-dim);box-shadow:none}
  @keyframes pulse{50%{opacity:.2}}
  .lcd-right .remain{color:var(--lcd-fg);font-family:'VT323',monospace}

  /* ── cassette ────────────────────────────────────────────── */
  .cassette{
    width:100%;
    aspect-ratio:1.56 / 1;
    position:relative;
    border-radius:6px;
    background:
      /* top half lighter, bottom darker simulating molded plastic */
      linear-gradient(180deg,
        color-mix(in oklch, var(--case), white 8%) 0%,
        var(--case) 38%,
        var(--case) 62%,
        color-mix(in oklch, var(--case), black 18%) 100%);
    border:1px solid var(--case-edge);
    box-shadow:
      0 1px 0 rgba(255,255,255,.1) inset,
      0 -2px 0 rgba(0,0,0,.4) inset,
      0 0 0 1px rgba(0,0,0,.4),
      0 18px 40px -10px rgba(0,0,0,.7),
      0 40px 90px -20px rgba(0,0,0,.8);
    overflow:hidden;
    transform:rotate(-1deg);
    cursor:pointer;
  }
  /* mold seam through middle */
  .cassette::before{
    content:"";position:absolute;
    left:0;right:0;top:50%;height:1px;
    background:linear-gradient(90deg, transparent, rgba(0,0,0,.5) 8%, rgba(0,0,0,.5) 92%, transparent);
    pointer-events:none;
  }
  /* screws at corners */
  .cassette::after{
    content:"";position:absolute;inset:0;pointer-events:none;
    background:
      radial-gradient(circle 4px at 14px 14px, #0a0a0c 0 2.5px, rgba(255,255,255,.06) 2.5px 3.5px, transparent 3.5px),
      radial-gradient(circle 4px at calc(100% - 14px) 14px, #0a0a0c 0 2.5px, rgba(255,255,255,.06) 2.5px 3.5px, transparent 3.5px),
      radial-gradient(circle 4px at 14px calc(100% - 14px), #0a0a0c 0 2.5px, rgba(255,255,255,.06) 2.5px 3.5px, transparent 3.5px),
      radial-gradient(circle 4px at calc(100% - 14px) calc(100% - 14px), #0a0a0c 0 2.5px, rgba(255,255,255,.06) 2.5px 3.5px, transparent 3.5px);
  }

  /* paper label on top portion */
  .label{
    position:absolute;
    left:5%;right:5%;top:5%;height:26%;
    background:
      linear-gradient(180deg, var(--label) 0%, color-mix(in oklch, var(--label), black 5%) 100%);
    border:1px solid color-mix(in oklch, var(--label), black 25%);
    border-radius:2px;
    box-shadow:0 1px 2px rgba(0,0,0,.4) inset, 0 1px 1px rgba(0,0,0,.3);
    overflow:hidden;
    display:grid;
    grid-template-columns:auto 1fr auto;
    gap:10px;
    padding:6px 12px 6px 0;
    align-items:center;
  }
  /* red label stripe */
  .label::before{
    content:"";position:absolute;left:0;top:0;bottom:0;width:18px;
    background:
      linear-gradient(180deg, var(--label-accent), color-mix(in oklch, var(--label-accent), black 18%));
    border-right:1px solid color-mix(in oklch, var(--label-accent), black 35%);
  }
  /* subtle paper texture */
  .label::after{
    content:"";position:absolute;inset:0;pointer-events:none;opacity:.5;
    background:
      repeating-linear-gradient(0deg, transparent 0 6px, rgba(0,0,0,.025) 6px 7px),
      repeating-linear-gradient(90deg, transparent 0 9px, rgba(0,0,0,.02) 9px 10px);
  }
  .label-brand{
    padding-left:28px;
    font-family:'Press Start 2P',monospace;
    color:var(--label-ink);
    font-size:clamp(11px, 1.6vw, 16px);
    letter-spacing:.04em;
    line-height:1;
    position:relative;z-index:2;
  }
  .label-brand small{
    display:block;font-family:'Special Elite',monospace;font-weight:normal;
    font-size:.78em;margin-top:5px;color:#5a3a2a;letter-spacing:.06em;
  }
  .label-mid{
    font-family:'Permanent Marker','Special Elite',cursive;
    color:#2a1810;
    font-size:clamp(11px, 1.5vw, 17px);
    text-align:center;
    line-height:1.1;
    transform:rotate(-1.5deg);
    text-decoration:underline 1px solid rgba(40,20,12,.4);
    text-underline-offset:3px;
    position:relative;z-index:2;
    user-select:none;
  }
  .label-side{
    font-family:'Press Start 2P',monospace;
    font-size:clamp(10px, 1.4vw, 14px);
    color:var(--label-ink);
    line-height:1;
    text-align:right;
    position:relative;z-index:2;
  }
  .label-side small{
    display:block;font-family:'Special Elite',monospace;font-weight:normal;
    font-size:.7em;color:#5a3a2a;margin-top:4px;letter-spacing:.04em;
  }

  /* tape area: large dark window from 32% to 90% */
  .tape-area{
    position:absolute;
    left:5%;right:5%;top:34%;bottom:9%;
    background:
      /* dark inside with a sheen at top */
      linear-gradient(180deg, #050304 0%, #0a0606 40%, #050304 100%);
    border:1px solid var(--case-edge);
    border-radius:2px;
    box-shadow:0 2px 3px rgba(0,0,0,.7) inset, 0 -1px 1px rgba(0,0,0,.5) inset;
    overflow:hidden;
  }

  /* two reel slots */
  .reel-slot{
    position:absolute;top:50%;transform:translateY(-50%);
    width:38%;aspect-ratio:1;
  }
  .reel-slot.left{left:6%}
  .reel-slot.right{right:6%}
  .reel-slot svg{width:100%;height:100%;display:block}
  .reel-spin{transform-origin:50% 50%;animation:spin 2.6s linear infinite;animation-play-state:paused}
  .state-rec .reel-spin{animation-play-state:running}
  .state-paused .reel-spin{animation-duration:9s;animation-play-state:running}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* tape strand passing between reels at the bottom of the window */
  .tape-strand{
    position:absolute;
    left:0;right:0;bottom:8%;
    height:5%;
    background:
      linear-gradient(180deg, transparent 0%, rgba(255,255,255,.04) 30%, rgba(0,0,0,.4) 50%, transparent 80%),
      var(--tape);
    box-shadow:0 -1px 0 rgba(255,255,255,.04), 0 1px 1px rgba(0,0,0,.5);
    z-index:2;
  }
  .tape-strand::before{
    content:"";position:absolute;inset:0;
    background:repeating-linear-gradient(90deg, rgba(255,255,255,.05) 0 1px, transparent 1px 5px);
    animation:strand 0.5s linear infinite;
    animation-play-state:paused;
  }
  .state-rec .tape-strand::before{animation-play-state:running}
  @keyframes strand{to{transform:translateX(-10px)}}

  /* bottom edge of cassette: head opening + pinch rollers + side text */
  .bot{
    position:absolute;left:0;right:0;bottom:0;height:9%;
    display:grid;
    grid-template-columns:1fr auto 1fr;
    gap:16px;
    padding:0 8%;
    align-items:center;
    color:#7a7a7c;
    font-family:'Special Elite',monospace;
    font-size:clamp(9px,1.0vw,11px);
    letter-spacing:.08em;
    z-index:2;
  }
  .bot .head-opening{
    height:60%;
    width:max(60px, 18%);
    background:#000;
    border:1px solid #000;
    border-radius:2px;
    box-shadow:0 1px 0 rgba(255,255,255,.08), 0 2px 3px rgba(0,0,0,.8) inset;
    position:relative;
  }
  /* two pinch roller holes inside head opening */
  .bot .head-opening::before,
  .bot .head-opening::after{
    content:"";position:absolute;top:50%;
    width:18%;aspect-ratio:1;
    border-radius:50%;
    background:radial-gradient(circle at 30% 30%, #3a3a3c, #050506 70%);
    transform:translateY(-50%);
  }
  .bot .head-opening::before{left:14%}
  .bot .head-opening::after{right:14%}
  .bot .left-txt{text-align:left}
  .bot .right-txt{text-align:right}

  /* ── controls ────────────────────────────────────────────── */
  .controls{
    display:flex;gap:10px;
    padding:8px 14px;
    background:linear-gradient(180deg,#2a2a2e,#18181a);
    border:1px solid #0a0a0c;
    border-radius:8px;
    box-shadow:
      0 1px 0 rgba(255,255,255,.06) inset,
      0 -1px 0 rgba(0,0,0,.4) inset,
      0 8px 18px -8px rgba(0,0,0,.7);
  }
  .ctl{
    appearance:none;border:0;
    width:54px;height:42px;
    border-radius:4px;
    background:linear-gradient(180deg,#3c3c40 0%, #28282c 50%, #1c1c20 100%);
    box-shadow:
      0 1px 0 rgba(255,255,255,.18) inset,
      0 -2px 2px rgba(0,0,0,.6) inset,
      0 2px 0 rgba(0,0,0,.5),
      0 4px 8px rgba(0,0,0,.4);
    color:#e8e8ea;
    font-family:'Press Start 2P',monospace;
    font-size:12px;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    position:relative;
    transition:transform .08s, box-shadow .08s;
  }
  .ctl:hover{background:linear-gradient(180deg,#48484c 0%, #2c2c30 50%, #1e1e22 100%)}
  .ctl:active,.ctl.pressed{
    transform:translateY(2px);
    box-shadow:
      0 1px 0 rgba(255,255,255,.06) inset,
      0 -1px 2px rgba(0,0,0,.6) inset,
      0 1px 2px rgba(0,0,0,.4);
  }
  .ctl.rec{color:#ff4040}
  .ctl.rec.armed{
    background:linear-gradient(180deg,#5c1a1a 0%, #c92020 50%, #8a0e0e 100%);
    color:#fff;
    box-shadow:
      0 1px 0 rgba(255,255,255,.3) inset,
      0 -2px 2px rgba(0,0,0,.5) inset,
      0 2px 0 rgba(0,0,0,.5),
      0 0 12px rgba(255,64,64,.7),
      0 0 28px rgba(255,64,64,.35);
    animation:recglow 1s infinite;
  }
  @keyframes recglow{50%{box-shadow:0 1px 0 rgba(255,255,255,.3) inset,0 -2px 2px rgba(0,0,0,.5) inset,0 2px 0 rgba(0,0,0,.5),0 0 18px rgba(255,64,64,.9),0 0 36px rgba(255,64,64,.5)}}
  .ctl-key{
    position:absolute;bottom:-16px;left:50%;transform:translateX(-50%);
    font-family:'IBM Plex Mono',monospace;font-size:9px;color:#6a6a6c;
    white-space:nowrap;
  }

  .hints{
    color:#5a5a5c;font-size:10.5px;letter-spacing:.06em;
    font-family:'IBM Plex Mono',monospace;
    text-align:center;
  }
  .hints b{color:#a0a0a2;font-weight:500}

</style>
</head>

<div class="stage" id="stage">
  <div id="root"></div>
</div>

<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "case": "metallic",
  "lcd": "green",
  "title": "interview · mira · 04"
}/*EDITMODE-END*/;

// ── color presets ──────────────────────────────────────────────
const CASE_PRESETS = {
  black:    { case:"#1a1a1c", light:"#2a2a2c", edge:"#050506", label:"#f4ead0", accent:"#c9322d", ink:"#1a1410" },
  smoke:    { case:"#2c2828", light:"#3a3636", edge:"#0a0808", label:"#eceaec", accent:"#222",    ink:"#1a1410" },
  beige:    { case:"#d9c98c", light:"#e7d9a8", edge:"#3b3522", label:"#fffaf0", accent:"#c33",    ink:"#1a1410" },
  red:      { case:"#9a2422", light:"#c33028", edge:"#1f0807", label:"#f4ead0", accent:"#1a1a1a", ink:"#1a1410" },
  cobalt:   { case:"#142a4a", light:"#1f3c6a", edge:"#040810", label:"#f4ead0", accent:"#ffb84d", ink:"#1a1410" },
  metallic: { case:"#b8b8be", light:"#d4d4d8", edge:"#3a3a3e", label:"#fffaf0", accent:"#1a1a1a", ink:"#1a1410" },
};
const LCD_PRESETS = {
  green: { bg:"#0c1a10", bgDeep:"#06100a", fg:"#7dff9a", fgBright:"#d4ffd6", dim:"#2a6a3a", dimmer:"#143a20", glowRGB:"125,255,154" },
  amber: { bg:"#1a1006", bgDeep:"#0e0803", fg:"#ffc466", fgBright:"#ffe8b8", dim:"#7a5212", dimmer:"#3a2a08", glowRGB:"255,196,102" },
  cyan:  { bg:"#061418", bgDeep:"#040c0e", fg:"#7df0ff", fgBright:"#d4f9ff", dim:"#2a667a", dimmer:"#10353f", glowRGB:"125,240,255" },
  red:   { bg:"#1a0808", bgDeep:"#0e0404", fg:"#ff7a7a", fgBright:"#ffd4d4", dim:"#7a2a2a", dimmer:"#3a1010", glowRGB:"255,122,122" },
};

// ── helpers ──────────────────────────────────────────────
const pad = (n, w=2) => String(n).padStart(w,"0");
function fmtTime(ms){
  const m = Math.floor(ms/60000);
  const s = Math.floor((ms%60000)/1000);
  const t = Math.floor((ms%1000)/100);
  return { ms: `${pad(m)}:${pad(s)}`, t };
}

// ── waveform ──────────────────────────────────────────────
const RAMP = ["·","▁","▂","▃","▄","▅","▆","▇","█"];
function genCols(t, n, amp){
  const cols = new Array(n);
  for(let i=0;i<n;i++){
    const x = i + t*60;
    const a = Math.sin(x*0.21)*0.55 + Math.sin(x*0.07 + t*1.3)*0.35 + Math.sin(x*0.43 + t*2.1)*0.20;
    const noise = (Math.sin(x*3.1+t*7)+Math.sin(x*5.9+t*11)) * 0.08;
    let v = Math.abs(a + noise) * amp;
    if(v>1) v=1;
    cols[i] = Math.round(v * (RAMP.length-1));
  }
  return cols;
}
function renderWave(cols, rows){
  const max = RAMP.length-1;
  const half = Math.floor(rows/2);
  const out = [];
  for(let r=0;r<rows;r++){
    let line = "";
    const dist = Math.abs(r - half) / half;
    for(let c=0;c<cols.length;c++){
      const norm = cols[c]/max;
      if(norm >= dist - 0.02){
        const span = norm - dist;
        line += RAMP[Math.max(0, Math.min(max, Math.round(span * max * 1.4)))];
      } else line += " ";
    }
    out.push(line);
  }
  return out.join("\n");
}

// ── reel SVG: hub + wound tape rings ──────────────────────────────────────────
// progress: 0..1 — amount of tape wound on THIS reel (0 = empty hub, 1 = full)
function Reel({progress = 0.5}){
  // outer wound-tape radius: hub is 22, tape can fill to 46
  const hubR = 22;
  const maxR = 46;
  const tapeR = hubR + (maxR - hubR) * Math.max(0, Math.min(1, progress));
  // generate subtle concentric ring offsets (for visible spiral)
  const rings = [];
  for(let r = hubR + 2; r < tapeR; r += 3){
    rings.push(r);
  }
  return (
    <svg viewBox="-50 -50 100 100" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="tapeGrad" cx="0.5" cy="0.5" r="0.5">
          <stop offset="0%" stopColor="#1a0a06" />
          <stop offset="60%" stopColor="#3a1a0c" />
          <stop offset="100%" stopColor="#2a1208" />
        </radialGradient>
      </defs>

      {/* hub well / case opening (always dark) */}
      <circle r="47" fill="#040202" />

      {/* wound tape disc */}
      {tapeR > hubR && (
        <>
          <circle r={tapeR} fill="url(#tapeGrad)" />
          {/* faint concentric ring marks giving spiral feel */}
          {rings.map((r,i)=>(
            <circle key={i} r={r} fill="none"
              stroke={i%2===0 ? "rgba(0,0,0,.18)" : "rgba(255,255,255,.025)"}
              strokeWidth=".4" />
          ))}
          {/* outer rim shadow */}
          <circle r={tapeR} fill="none" stroke="rgba(0,0,0,.5)" strokeWidth="1" />
          <circle r={tapeR-0.5} fill="none" stroke="rgba(255,255,255,.04)" strokeWidth=".5" />
        </>
      )}

      {/* spinning group: hub with spokes + one off-center marker for visible rotation */}
      <g className="reel-spin">
        {/* hub plate (clear plastic / cream) */}
        <circle r={hubR} fill="#e8dcb8" stroke="#7a6a4a" strokeWidth=".5" />
        <circle r={hubR-1.5} fill="none" stroke="rgba(0,0,0,.15)" strokeWidth=".5" />

        {/* 6 hub spoke slots (the dark + cross you see in real cassettes) */}
        {[0,60,120,180,240,300].map(a=>(
          <g key={a} transform={`rotate(${a})`}>
            <rect x="-2.5" y="-19" width="5" height="14" fill="#040202" rx="1" />
          </g>
        ))}

        {/* asymmetric marker so rotation is visible */}
        <circle cx="0" cy="-14" r="1.6" fill="#c9322d" />

        {/* center drive cog */}
        <circle r="6.5" fill="#1a1410" />
        {[0,45,90,135,180,225,270,315].map(a=>(
          <rect key={a} x="-1.6" y="-6.5" width="3.2" height="3"
            fill="#3a3022" transform={`rotate(${a})`} />
        ))}
        <circle r="2" fill="#040202" />
      </g>

      {/* outer wound-tape highlight (very subtle, makes it look 3D) */}
      {tapeR > hubR && (
        <circle r={tapeR} fill="none" stroke="rgba(255,255,255,.05)" strokeWidth=".5" strokeDasharray="3 5" />
      )}
    </svg>
  );
}

// ── meter ──────────────────────────────────────────────
function Meter({level}){
  const N = 18;
  const lit = Math.round(level * N);
  const cells = [];
  for(let i=0;i<N;i++){
    let cls = "";
    if(i < lit){
      if(i < N*0.6) cls = "on";
      else if(i < N*0.85) cls = "mid";
      else cls = "hot";
    }
    cells.push(<span key={i} className={cls}>{i<lit ? "█" : "░"}</span>);
  }
  const dB = level <= 0.001 ? "-∞" : (20*Math.log10(level)).toFixed(0);
  return (
    <span className="meter">
      <span className="bars">{cells}</span>
      <span className="db">{dB} dB</span>
    </span>
  );
}

// ── App ──────────────────────────────────────────────
function App(){
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [recState, setRecState] = useState("idle");
  const [elapsed, setElapsed] = useState(0);
  const [waveT, setWaveT] = useState(0);
  const [micLvl, setMicLvl] = useState(0.05);

  // apply tweaks to CSS vars
  useEffect(()=>{
    const c = CASE_PRESETS[t.case] || CASE_PRESETS.black;
    const l = LCD_PRESETS[t.lcd] || LCD_PRESETS.green;
    const r = document.documentElement;
    r.style.setProperty("--case", c.case);
    r.style.setProperty("--case-light", c.light);
    r.style.setProperty("--case-edge", c.edge);
    r.style.setProperty("--label", c.label);
    r.style.setProperty("--label-ink", c.ink);
    r.style.setProperty("--label-accent", c.accent);
    r.style.setProperty("--lcd-bg", l.bg);
    r.style.setProperty("--lcd-bg-deep", l.bgDeep);
    r.style.setProperty("--lcd-fg", l.fg);
    r.style.setProperty("--lcd-fg-bright", l.fgBright);
    r.style.setProperty("--lcd-dim", l.dim);
    r.style.setProperty("--lcd-dimmer", l.dimmer);
    r.style.setProperty("--lcd-glow-rgb", l.glowRGB);
  },[t.case, t.lcd]);

  // elapsed
  const startRef = useRef(null);
  const baseRef = useRef(0);
  useEffect(()=>{
    if(recState !== "rec") return;
    startRef.current = performance.now();
    let id;
    const tick = ()=>{
      setElapsed(baseRef.current + (performance.now() - startRef.current));
      id = requestAnimationFrame(tick);
    };
    id = requestAnimationFrame(tick);
    return ()=>{
      cancelAnimationFrame(id);
      baseRef.current = baseRef.current + (performance.now() - startRef.current);
    };
  },[recState]);

  // waveform clock
  const ampTarget = recState==="rec" ? 0.92 : recState==="paused" ? 0.18 : 0.06;
  const ampRef = useRef(0.06);
  useEffect(()=>{
    let id, last = performance.now();
    const tick = (now)=>{
      const dt = Math.min(100, now - last) / 1000;
      last = now;
      ampRef.current += (ampTarget - ampRef.current) * Math.min(1, dt*4);
      setWaveT(p => p + dt * (recState==="rec" ? 1 : 0.1));
      id = requestAnimationFrame(tick);
    };
    id = requestAnimationFrame(tick);
    return ()=>cancelAnimationFrame(id);
  },[ampTarget, recState]);

  // mic level
  useEffect(()=>{
    const i = setInterval(()=>{
      const base = recState==="rec" ? 0.55 : recState==="paused" ? 0.1 : 0.05;
      const wob = recState==="rec" ? (Math.random()*0.45) : (Math.random()*0.05);
      setMicLvl(Math.min(1, base + wob));
    }, 90);
    return ()=>clearInterval(i);
  },[recState]);

  // measure waveform pre
  const waveRef = useRef(null);
  const [dims, setDims] = useState({cols:60, rows:3});
  useEffect(()=>{
    if(!waveRef.current) return;
    const measure = ()=>{
      const el = waveRef.current;
      if(!el) return;
      const probe = document.createElement("span");
      probe.style.font = getComputedStyle(el).font;
      probe.style.visibility = "hidden";
      probe.style.position = "absolute";
      probe.textContent = "M".repeat(40);
      document.body.appendChild(probe);
      const charW = probe.getBoundingClientRect().width / 40;
      const lineH = parseFloat(getComputedStyle(el).fontSize);
      document.body.removeChild(probe);
      const w = el.clientWidth;
      const h = el.clientHeight;
      const cols = Math.max(20, Math.floor(w / charW) - 1);
      let rows = Math.max(2, Math.floor(h / lineH));
      if(rows % 2 === 0) rows -= 1;
      setDims({cols, rows: Math.min(rows, 3)});
    };
    measure();
    const ro = new ResizeObserver(measure);
    ro.observe(waveRef.current);
    window.addEventListener("resize", measure);
    return ()=>{ro.disconnect();window.removeEventListener("resize", measure)};
  },[]);
  const waveStr = useMemo(()=>{
    return renderWave(genCols(waveT, dims.cols, ampRef.current), dims.rows);
  },[waveT, dims]);

  // controls
  const startRec = useCallback(()=>{
    if(recState === "idle"){ baseRef.current = 0; setElapsed(0); }
    setRecState("rec");
  },[recState]);
  const pauseRec = useCallback(()=>{
    if(recState === "rec") setRecState("paused");
    else if(recState === "paused") setRecState("rec");
  },[recState]);
  const stopRec = useCallback(()=>{
    if(recState === "idle") return;
    setRecState("idle");
    baseRef.current = 0;
    setTimeout(()=>setElapsed(0), 50);
  },[recState]);

  // keyboard
  useEffect(()=>{
    const onKey = (e)=>{
      if(e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
      if(e.key === " "){ e.preventDefault();
        if(recState === "idle") startRec();
        else pauseRec();
      } else if(e.key === "r" || e.key === "R"){ e.preventDefault(); startRec(); }
      else if(e.key === "Escape" || e.key === "s" || e.key === "S"){ e.preventDefault(); stopRec(); }
    };
    window.addEventListener("keydown", onKey);
    return ()=>window.removeEventListener("keydown", onKey);
  },[recState, startRec, pauseRec, stopRec]);

  const tf = fmtTime(elapsed);
  const stateClass = recState === "rec" ? "state-rec" : recState === "paused" ? "state-paused" : "state-idle";
  const stateLabel = recState === "rec" ? "REC" : recState === "paused" ? "PAUSE" : "STOP";

  // tape progress: simulate a 90-minute tape; left reel starts FULL, right reel starts EMPTY
  const totalMin = 90;
  const totalMs = totalMin * 60 * 1000;
  // small offset so reels aren't 100%/0% at idle (looks weird) — partially through
  const baseProgress = 0.18;
  const progressRight = Math.min(1, baseProgress + (elapsed/totalMs) * (1 - baseProgress) * 0.9);
  const progressLeft = Math.max(0, 1 - progressRight + 0.05);

  const remainMs = Math.max(0, totalMs - elapsed);
  const remain = fmtTime(remainMs);

  return (
    <div className={"device " + stateClass}>

      <div className="topbar">
        <span className="brandbig">REKK<sub>handheld dictation 88</sub></span>
        <span className="led">
          <span className="dot" /><span>{stateLabel === "REC" ? "RECORDING" : stateLabel === "PAUSE" ? "PAUSED" : "READY"}</span>
        </span>
      </div>

      {/* separate counter strip with LCD */}
      <div className="counter">
        <div className="counter-brand">
          rekk-88<small>counter</small>
        </div>
        <div className="lcd">
          <div className="lcd-time">
            {tf.ms}<span className="ms">.{tf.t}</span>
          </div>
          <div className="lcd-mid">
            <pre ref={waveRef}>{waveStr}</pre>
            <div className="meter">
              <span className="bars">
                {(() => {
                  const N = 22;
                  const lit = Math.round(micLvl * N);
                  const cells = [];
                  for(let i=0;i<N;i++){
                    let cls = "";
                    if(i < lit){
                      if(i < N*0.6) cls = "on";
                      else if(i < N*0.85) cls = "mid";
                      else cls = "hot";
                    }
                    cells.push(<span key={i} className={cls}>{i<lit ? "█" : "░"}</span>);
                  }
                  return cells;
                })()}
              </span>
              <span className="db">{micLvl <= 0.001 ? "-∞" : (20*Math.log10(micLvl)).toFixed(0)} dB</span>
            </div>
          </div>
          <div className="lcd-right">
            <span className="state">
              <span className="recdot" />{stateLabel}
            </span>
            <span className="remain">-{remain.ms}</span>
          </div>
        </div>
      </div>

      {/* the cassette itself — fully traditional, no LCD */}
      <div className="cassette" onClick={()=>{
        if(recState==="idle") startRec();
        else if(recState==="rec") pauseRec();
        else if(recState==="paused") pauseRec();
      }}>
        {/* paper label */}
        <div className="label">
          <div className="label-brand">
            rekk<small>c-90 type ii</small>
          </div>
          <div className="label-mid">{t.title}</div>
          <div className="label-side">
            A<small>side a · 45m</small>
          </div>
        </div>

        {/* dark tape window with reels */}
        <div className="tape-area">
          <div className="reel-slot left"><Reel progress={progressLeft} /></div>
          <div className="reel-slot right"><Reel progress={progressRight} /></div>
          <div className="tape-strand" />
        </div>

        {/* bottom: side text + head opening + side text */}
        <div className="bot">
          <span className="left-txt">▶ side a</span>
          <div className="head-opening" />
          <span className="right-txt">norm · 120µs</span>
        </div>
      </div>

      {/* controls */}
      <div className="controls" onClick={(e)=>e.stopPropagation()}>
        <button className="ctl" title="rewind">◀◀<span className="ctl-key">REW</span></button>
        <button className="ctl" onClick={pauseRec} title="pause/resume" disabled={recState==="idle"}>
          ❚❚<span className="ctl-key">P · space</span>
        </button>
        <button className="ctl" onClick={stopRec} title="stop">
          ■<span className="ctl-key">STOP · esc</span>
        </button>
        <button className={"ctl rec " + (recState==="rec" ? "armed" : "")} onClick={startRec} title="record">
          ●<span className="ctl-key">REC · R</span>
        </button>
        <button className="ctl" title="fast-forward">▶▶<span className="ctl-key">FF</span></button>
      </div>

      <div className="hints">
        click cassette to <b>rec</b>/<b>pause</b> · <b>space</b> toggle · <b>esc</b> stop
      </div>

      <TweaksPanel>
        <TweakSection label="Cassette" />
        <TweakColor
          label="Shell"
          value={CASE_PRESETS[t.case].case}
          options={Object.values(CASE_PRESETS).map(p=>p.case)}
          onChange={(v)=>{
            const key = Object.keys(CASE_PRESETS).find(k=>CASE_PRESETS[k].case===v) || "black";
            setTweak("case", key);
          }}
        />
        <TweakText label="Title (handwritten)" value={t.title}
          onChange={(v)=>setTweak("title", v)} />
        <TweakSection label="Counter LCD" />
        <TweakColor
          label="Phosphor"
          value={LCD_PRESETS[t.lcd].fg}
          options={Object.values(LCD_PRESETS).map(p=>p.fg)}
          onChange={(v)=>{
            const key = Object.keys(LCD_PRESETS).find(k=>LCD_PRESETS[k].fg===v) || "green";
            setTweak("lcd", key);
          }}
        />
        <TweakSection label="Transport" />
        <TweakButton
          label={recState==="idle" ? "Start recording" : "Stop recording"}
          onClick={()=>recState==="idle" ? startRec() : stopRec()}
        />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
