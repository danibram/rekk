<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>rekk — audio recorder</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Press+Start+2P&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

<style>
  :root{
    --bg:#050805;
    --bg-deep:#020302;
    --fg:#5cff7a;
    --fg-bright:#b7ffc4;
    --dim:#1f6a32;
    --dimmer:#0d3018;
    --accent:#ff5c5c;
    --warn:#ffb000;
    --glow:0 0 1px currentColor, 0 0 6px rgba(92,255,122,.45), 0 0 18px rgba(92,255,122,.18);
    --scan-opacity:.22;
    --curve:1;
    --noise:.06;
  }

  *,*::before,*::after{box-sizing:border-box}
  html,body{height:100%;margin:0;background:#000;overflow:hidden}
  body{
    font-family:'VT323','IBM Plex Mono',ui-monospace,monospace;
    color:var(--fg);
    background:
      radial-gradient(ellipse at 50% 40%, #0a1208 0%, #050805 50%, #000 100%);
    text-shadow:var(--glow);
    -webkit-font-smoothing:antialiased;
  }

  /* CRT shell ------------------------------------------------------------- */
  .crt{
    position:fixed;inset:0;
    display:grid;grid-template-rows:1fr;
    padding:clamp(10px,2vh,28px) clamp(10px,2vw,40px);
    overflow:hidden;
  }
  .crt-inner{
    position:relative;
    height:100%;
    border-radius:14px;
    background:linear-gradient(180deg,#070b07 0%,#040604 100%);
    box-shadow:
      0 0 0 1px rgba(92,255,122,.12),
      inset 0 0 80px rgba(0,0,0,.65),
      inset 0 0 220px rgba(0,0,0,.85);
    overflow:hidden;
    transform:perspective(1200px) rotateX(calc(var(--curve) * .3deg));
  }
  /* scanlines */
  .crt-inner::before{
    content:"";position:absolute;inset:0;pointer-events:none;z-index:50;
    background:
      repeating-linear-gradient(
        to bottom,
        rgba(0,0,0,0) 0px,
        rgba(0,0,0,0) 2px,
        rgba(0,0,0,var(--scan-opacity)) 3px,
        rgba(0,0,0,var(--scan-opacity)) 3px
      );
    mix-blend-mode:multiply;
  }
  /* vignette + noise */
  .crt-inner::after{
    content:"";position:absolute;inset:0;pointer-events:none;z-index:51;
    background:
      radial-gradient(ellipse at 50% 50%, transparent 55%, rgba(0,0,0,.55) 100%);
  }
  .crt-flicker{
    position:absolute;inset:0;pointer-events:none;z-index:52;
    background:rgba(255,255,255,.012);
    animation:flicker 7.3s infinite steps(1);
  }
  @keyframes flicker{
    0%,97%{opacity:1}
    97.5%{opacity:.86}
    98%{opacity:1}
    98.5%{opacity:.93}
    99%{opacity:1}
  }

  /* App layout ------------------------------------------------------------ */
  .app{
    position:relative;z-index:2;
    height:100%;
    display:grid;
    grid-template-rows:auto auto 1fr auto;
    padding:clamp(8px,1.4vh,18px) clamp(14px,2vw,28px);
    gap:clamp(6px,1vh,14px);
    font-size:clamp(18px,1.55vw,24px);
    line-height:1.1;
  }

  /* Title bar */
  .titlebar{
    display:flex;align-items:center;justify-content:space-between;
    border-bottom:1px solid var(--dim);
    padding-bottom:6px;
    font-size:1em;
  }
  .titlebar .left{display:flex;gap:14px;align-items:baseline}
  .titlebar .brand{
    font-family:'Press Start 2P',monospace;
    font-size:.68em;letter-spacing:.05em;
    color:var(--fg-bright);
  }
  .titlebar .meta{color:var(--dim)}
  .titlebar .right{display:flex;gap:6px;align-items:center;color:var(--dim)}
  .winbtn{
    display:inline-block;width:1.2em;text-align:center;
    border:1px solid var(--dim);padding:0 .2em;color:var(--fg);
  }

  /* Prompt line */
  .prompt{display:flex;gap:.6em;color:var(--dim);font-size:.95em}
  .prompt .cmd{color:var(--fg)}
  .cursor{
    display:inline-block;width:.55em;background:var(--fg);
    color:var(--bg);animation:blink 1.05s steps(1) infinite;
    margin-left:.1em;
  }
  @keyframes blink{50%{opacity:0}}

  /* Main grid */
  .main{
    display:grid;
    grid-template-columns:1.05fr 1fr;
    grid-template-rows:clamp(72px, 11vh, 100px) minmax(110px, 1fr) minmax(140px, 1.4fr);
    gap:clamp(8px,1vh,14px);
    min-height:0;
  }

  /* Panels (ASCII box-drawn) */
  .panel{
    position:relative;
    border:1px solid var(--dim);
    padding:11px 12px 8px;
    background:rgba(8,14,8,.35);
    min-height:0;
    display:flex;flex-direction:column;
  }
  .panel > .ptitle{
    position:absolute;top:-.65em;left:14px;
    background:#050805;padding:0 .55em;
    color:var(--fg-bright);
    font-size:.82em;letter-spacing:.12em;text-transform:uppercase;
  }
  .panel > .ptitle .dot{color:var(--dim)}

  /* Timer panel */
  .timer{grid-column:1;grid-row:1}
  .timer-inner{display:grid;grid-template-columns:1fr auto;align-items:center;gap:16px}
  .timer-big{
    font-family:'Press Start 2P',monospace;
    font-size:clamp(22px,3.6vw,52px);
    color:var(--fg-bright);
    letter-spacing:.04em;
    line-height:1;
    text-shadow:0 0 2px currentColor,0 0 12px rgba(92,255,122,.55),0 0 26px rgba(92,255,122,.25);
  }
  .timer-big .ms{font-size:.55em;color:var(--fg);opacity:.7;margin-left:.25em}
  .timer-status{display:flex;flex-direction:column;gap:3px;text-align:right;font-size:.86em;min-width:0}
  .status-row{display:flex;justify-content:flex-end;gap:.5em;align-items:center}
  .recdot{
    display:inline-block;width:.7em;height:.7em;border-radius:50%;
    background:var(--accent);box-shadow:0 0 6px var(--accent),0 0 14px var(--accent);
  }
  .state-rec .recdot{animation:pulse 1s infinite}
  .state-paused .recdot{background:var(--warn);box-shadow:0 0 6px var(--warn)}
  .state-idle .recdot{background:var(--dim);box-shadow:none}
  @keyframes pulse{50%{opacity:.25}}

  .badge{
    border:1px solid currentColor;padding:0 .45em;font-size:.78em;
    letter-spacing:.08em;text-transform:uppercase;
  }
  .badge-rec{color:var(--accent)}
  .badge-paused{color:var(--warn)}
  .badge-idle{color:var(--dim)}

  /* Input panel */
  .input{grid-column:2;grid-row:1}
  .input-grid{display:grid;grid-template-columns:auto 1fr;gap:6px 14px;font-size:.95em}
  .input-grid .k{color:var(--dim)}
  .input-grid .v{color:var(--fg)}
  .meter{
    display:flex;align-items:center;gap:.5em;font-variant-numeric:tabular-nums;
  }
  .meter .bars{letter-spacing:1px}
  .meter .bars .on{color:var(--fg-bright)}
  .meter .bars .mid{color:var(--warn)}
  .meter .bars .hot{color:var(--accent)}
  .meter .bars .off{color:var(--dimmer)}

  /* Waveform panel */
  .wave{grid-column:1 / span 2;grid-row:2}
  .wave{min-height:0}
  .wave pre{
    margin:0;font-family:inherit;font-size:clamp(11px,1.1vw,18px);
    line-height:1;letter-spacing:0;white-space:pre;
    color:var(--fg-bright);
    overflow:hidden;
    flex:1;min-height:0;
  }
  .wave .axis{color:var(--dimmer);font-size:.7em;display:flex;justify-content:space-between;margin-top:4px}

  /* Transcript panel */
  .transcript{grid-column:1;grid-row:3;min-height:0}
  .transcript .body{
    flex:1;min-height:120px;overflow-y:auto;
    font-size:1em;line-height:1.25;
    padding-right:6px;
    scrollbar-width:thin;scrollbar-color:var(--dim) transparent;
  }
  .transcript .body::-webkit-scrollbar{width:8px}
  .transcript .body::-webkit-scrollbar-thumb{background:var(--dim)}
  .transcript .line{display:flex;gap:.6em;margin-bottom:.15em}
  .transcript .ts{color:var(--dimmer);flex:0 0 auto}
  .transcript .text{color:var(--fg)}
  .transcript .text.partial{color:var(--dim);font-style:normal}
  .transcript .text .word-new{
    animation:typein .35s ease-out both;
  }
  @keyframes typein{from{opacity:0}to{opacity:1}}
  .empty{color:var(--dimmer);font-style:normal;font-size:.95em}

  /* Recordings */
  .files{grid-column:2;grid-row:3;min-height:0}
  .files .body{flex:1;min-height:120px;overflow-y:auto;font-size:.95em;scrollbar-width:thin;scrollbar-color:var(--dim) transparent}
  .files .body::-webkit-scrollbar{width:8px}
  .files .body::-webkit-scrollbar-thumb{background:var(--dim)}
  .file-row{
    display:grid;
    grid-template-columns:auto 1fr auto auto;
    gap:14px;align-items:center;
    padding:3px 6px;
    cursor:default;
  }
  .file-row:hover, .file-row.sel{background:var(--fg);color:var(--bg);text-shadow:none}
  .file-row:hover *, .file-row.sel *{color:inherit !important}
  .file-row .date{color:var(--dim)}
  .file-row .name{color:var(--fg-bright);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .file-row .dur{color:var(--fg);font-variant-numeric:tabular-nums}
  .file-row .sz{color:var(--dim);font-variant-numeric:tabular-nums}
  .files-head{
    display:grid;grid-template-columns:auto 1fr auto auto;gap:14px;
    color:var(--dimmer);font-size:.82em;letter-spacing:.1em;text-transform:uppercase;
    padding:0 6px 4px;border-bottom:1px dashed var(--dimmer);margin-bottom:4px;
  }

  /* Controls */
  .controls{
    display:flex;gap:6px;flex-wrap:wrap;
    padding:2px 0 0;
    font-size:.88em;
  }
  .btn{
    appearance:none;background:transparent;color:var(--fg);
    border:1px solid var(--fg);
    font-family:inherit;font-size:1em;
    padding:2px 10px;
    letter-spacing:.06em;
    cursor:default;
    text-shadow:var(--glow);
    position:relative;
    display:inline-flex;align-items:center;gap:.55em;
  }
  .btn::before{content:"[ ";color:var(--dim)}
  .btn::after{content:" ]";color:var(--dim)}
  .btn:hover:not(:disabled){background:var(--fg);color:var(--bg);text-shadow:none}
  .btn:hover:not(:disabled)::before,.btn:hover:not(:disabled)::after{color:var(--bg)}
  .btn:disabled{color:var(--dimmer);border-color:var(--dimmer);cursor:not-allowed}
  .btn:disabled::before,.btn:disabled::after{color:var(--dimmer)}
  .btn.danger{color:var(--accent);border-color:var(--accent)}
  .btn.danger:hover:not(:disabled){background:var(--accent);color:#1a0000}
  .btn.warn{color:var(--warn);border-color:var(--warn)}
  .btn.warn:hover:not(:disabled){background:var(--warn);color:#1a0e00}
  .btn-key{
    font-size:.7em;color:var(--dim);border:1px solid currentColor;
    padding:0 .3em;margin-left:.3em;
  }
  .btn:hover:not(:disabled) .btn-key{color:inherit}

  /* Bottom bar */
  .botbar{
    display:flex;justify-content:space-between;align-items:center;
    border-top:1px solid var(--dim);padding-top:4px;
    font-size:.82em;color:var(--dim);
    gap:10px;flex-wrap:wrap;
    line-height:1.2;
  }
  .keys{display:flex;gap:10px;flex-wrap:wrap;row-gap:2px}
  .keys span b{color:var(--fg-bright);font-weight:normal;margin-right:.25em}

  /* Mobile */
  @media (max-width: 880px){
    .main{grid-template-columns:1fr}
    .timer{grid-column:1;grid-row:1}
    .input{grid-column:1;grid-row:2}
    .wave{grid-column:1;grid-row:3}
    .transcript{grid-column:1;grid-row:4}
    .files{grid-column:1;grid-row:5}
  }
</style>
</head>

<script type="text/babel" data-presets="react">
// rekk-app.jsx — main app

const { useState, useEffect, useRef, useMemo, useCallback } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "phosphor": "cyan",
  "scanlines": 0.08,
  "curve": false,
  "flicker": true,
  "timerFont": "8bit",
  "asciiStyle": "blocks",
  "transcriptDensity": "comfy"
}/*EDITMODE-END*/;

// ─── waveform generation ──────────────────────────────────────────────────
const ASCII_RAMPS = {
  blocks: ["·","▁","▂","▃","▄","▅","▆","▇","█"],
  ascii:  [" ",".",":","-","=","+","*","#","@"],
  bars:   [" ","_","-","~","=","≡","|","║","█"],
  spikes: [" ",".",",",":","i","I","|","‖","█"],
};

function genWaveCols(t, n, amplitude, style){
  const ramp = ASCII_RAMPS[style] || ASCII_RAMPS.blocks;
  const max = ramp.length - 1;
  const cols = new Array(n);
  // multi-sine + light noise so it looks like real audio
  for(let i=0; i<n; i++){
    const x = i + t*60; // scrolling
    const a =
      Math.sin(x*0.21) * 0.55 +
      Math.sin(x*0.07 + t*1.3) * 0.35 +
      Math.sin(x*0.43 + t*2.1) * 0.20 +
      (Math.sin(x*1.7)*0.5 + 0.5) * 0.30 * Math.sin(t*0.9);
    const noise = (Math.sin(x*3.1 + t*7) + Math.sin(x*5.9 + t*11)) * 0.07;
    let v = Math.abs(a + noise) * amplitude;
    if(v > 1) v = 1;
    cols[i] = Math.round(v * max);
  }
  return { cols, ramp, max };
}

function renderWaveRows(colsData, rows){
  const { cols, ramp, max } = colsData;
  // Build symmetric waveform: top half mirrored to bottom half
  const out = [];
  const half = Math.floor(rows/2);
  for(let r=0; r<rows; r++){
    let line = "";
    const distFromMid = Math.abs(r - half) / half; // 0 at mid → 1 at edges
    for(let c=0; c<cols.length; c++){
      const norm = cols[c] / max; // 0..1 amplitude
      // a column is "filled" if its amplitude reaches this row
      if(norm >= distFromMid - 0.02){
        // pick density: rows closer to center use top of ramp, edges use bottom
        const span = norm - distFromMid;
        const ch = ramp[Math.max(0, Math.min(max, Math.round(span * max * 1.4)))];
        line += ch;
      } else {
        line += " ";
      }
    }
    out.push(line);
  }
  return out.join("\n");
}

// ─── helpers ──────────────────────────────────────────────────────────────
const pad = (n, w=2) => String(n).padStart(w, "0");
function fmtTime(ms){
  const h = Math.floor(ms/3600000);
  const m = Math.floor((ms%3600000)/60000);
  const s = Math.floor((ms%60000)/1000);
  const t = Math.floor((ms%1000)/100);
  return { hms:`${pad(h)}:${pad(m)}:${pad(s)}`, t };
}
function fmtNowClock(d){
  return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
}
function fmtDateYMD(d){
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function bytesFromMs(ms){
  // 48000Hz * 24bit * 2ch = 288000 B/s ≈ 274 KiB/s
  const b = ms / 1000 * 288000;
  if(b > 1024*1024) return (b/1024/1024).toFixed(1) + "M";
  if(b > 1024) return (b/1024).toFixed(0) + "K";
  return Math.round(b) + "B";
}

// ─── meter ────────────────────────────────────────────────────────────────
function LevelMeter({level, peak}){
  // level: 0..1, peak: 0..1
  const total = 22;
  const lit = Math.round(level*total);
  const peakIdx = Math.round(peak*total);
  const cells = [];
  for(let i=0; i<total; i++){
    let cls = "off", ch = "░";
    if(i < lit){
      ch = "█";
      if(i < total*0.6) cls = "on";
      else if(i < total*0.85) cls = "mid";
      else cls = "hot";
    } else if(i === peakIdx-1){
      ch = "│";
      cls = "on";
    }
    cells.push(<span key={i} className={cls}>{ch}</span>);
  }
  const dB = level <= 0.001 ? "-∞" : (20*Math.log10(level)).toFixed(0);
  return (
    <span className="meter">
      <span className="bars">{cells}</span>
      <span style={{minWidth:"3.5em",textAlign:"right"}}>{dB} dB</span>
    </span>
  );
}

// ─── transcript line ──────────────────────────────────────────────────────
function TranscriptLine({line}){
  return (
    <div className="line">
      <span className="ts">[{line.ts}]</span>
      <span className={"text " + (line.partial ? "partial" : "")}>
        {line.partial ? <>{line.text}<span className="cursor" style={{height:"0.9em",verticalAlign:"baseline"}}>&nbsp;</span></> : line.text}
      </span>
    </div>
  );
}

// ─── recordings list ──────────────────────────────────────────────────────
function FilesPanel({files, sel, onSel}){
  return (
    <div className="panel files">
      <span className="ptitle">┤ recordings <span className="dot">[{files.length}]</span> ├</span>
      <div className="files-head">
        <span>date</span><span>name</span><span>dur</span><span>size</span>
      </div>
      <div className="body">
        {files.map((f,i)=>(
          <div key={i}
            className={"file-row " + (sel===i ? "sel" : "")}
            onMouseEnter={()=>onSel(i)}
          >
            <span className="date">{f.date}</span>
            <span className="name">► {f.name}</span>
            <span className="dur">{f.dur}</span>
            <span className="sz">{f.sz}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── main ─────────────────────────────────────────────────────────────────
function App(){
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [recState, setRecState] = useState("idle"); // idle | rec | paused
  const [elapsed, setElapsed] = useState(0);
  const [files, setFiles] = useState(SEED_FILES);
  const [selFile, setSelFile] = useState(-1);
  const [transcript, setTranscript] = useState([]); // {ts,text,partial}
  const [now, setNow] = useState(new Date());

  // apply phosphor preset to CSS vars
  useEffect(()=>{
    const p = PHOSPHOR_PRESETS[t.phosphor] || PHOSPHOR_PRESETS.green;
    const r = document.documentElement;
    r.style.setProperty("--bg", p.bg);
    r.style.setProperty("--fg", p.fg);
    r.style.setProperty("--fg-bright", p.fgBright);
    r.style.setProperty("--dim", p.dim);
    r.style.setProperty("--dimmer", p.dimmer);
    r.style.setProperty("--glow",
      `0 0 1px currentColor, 0 0 6px rgba(${p.glowRGB},.45), 0 0 18px rgba(${p.glowRGB},.18)`);
    r.style.setProperty("--scan-opacity", String(t.scanlines));
    r.style.setProperty("--curve", t.curve ? "1" : "0");
  },[t.phosphor, t.scanlines, t.curve]);

  // wall clock (1s)
  useEffect(()=>{
    const i = setInterval(()=>setNow(new Date()), 1000);
    return ()=>clearInterval(i);
  },[]);

  // elapsed timer (driven by rAF for smooth ms)
  const startedAtRef = useRef(null);
  const baseRef = useRef(0);
  useEffect(()=>{
    if(recState !== "rec") return;
    startedAtRef.current = performance.now();
    let id;
    const tick = ()=>{
      setElapsed(baseRef.current + (performance.now() - startedAtRef.current));
      id = requestAnimationFrame(tick);
    };
    id = requestAnimationFrame(tick);
    return ()=>{
      cancelAnimationFrame(id);
      baseRef.current = baseRef.current + (performance.now() - startedAtRef.current);
    };
  },[recState]);

  // waveform animation
  const [waveT, setWaveT] = useState(0);
  const waveAmpTarget = recState === "rec" ? 0.95 : recState === "paused" ? 0.18 : 0.05;
  const waveAmpRef = useRef(0.05);
  const waveColsRef = useRef(120);
  useEffect(()=>{
    let id, last = performance.now();
    const tick = (now)=>{
      const dt = Math.min(100, now - last) / 1000;
      last = now;
      // ease amplitude
      waveAmpRef.current += (waveAmpTarget - waveAmpRef.current) * Math.min(1, dt*4);
      setWaveT(prev => prev + dt * (recState==="rec" ? 1 : recState==="paused" ? 0.05 : 0.15));
      id = requestAnimationFrame(tick);
    };
    id = requestAnimationFrame(tick);
    return ()=>cancelAnimationFrame(id);
  },[waveAmpTarget, recState]);

  // measure waveform width in cols
  const waveRef = useRef(null);
  const [waveDims, setWaveDims] = useState({cols:120, rows:7});
  useEffect(()=>{
    if(!waveRef.current) return;
    const measure = ()=>{
      const el = waveRef.current;
      if(!el) return;
      // create a sample char to measure
      const probe = document.createElement("span");
      probe.style.font = getComputedStyle(el).font;
      probe.style.visibility = "hidden";
      probe.style.position = "absolute";
      probe.textContent = "M".repeat(50);
      document.body.appendChild(probe);
      const charW = probe.getBoundingClientRect().width / 50;
      const lineH = parseFloat(getComputedStyle(el).fontSize); // line-height:1
      document.body.removeChild(probe);
      const w = el.clientWidth;
      const h = el.clientHeight;
      const cols = Math.max(40, Math.floor(w / charW) - 1);
      const rows = Math.max(5, Math.floor(h / lineH));
      setWaveDims({cols, rows: rows % 2 === 0 ? rows - 1 : rows});
    };
    measure();
    const ro = new ResizeObserver(measure);
    ro.observe(waveRef.current);
    window.addEventListener("resize", measure);
    return ()=>{ro.disconnect();window.removeEventListener("resize", measure)};
  },[t.asciiStyle]);

  const waveAscii = useMemo(()=>{
    const { cols, rows } = waveDims;
    const data = genWaveCols(waveT, cols, waveAmpRef.current, t.asciiStyle);
    return renderWaveRows(data, rows);
  // eslint-disable-next-line react-hooks/exhaustive-deps
  },[waveT, waveDims, t.asciiStyle]);

  // mic level meter (animated)
  const [micLvl, setMicLvl] = useState(0.05);
  const [micPeak, setMicPeak] = useState(0.05);
  useEffect(()=>{
    const i = setInterval(()=>{
      const base = recState==="rec" ? 0.55 : recState==="paused" ? 0.1 : 0.05;
      const wobble = recState==="rec" ? (Math.random()*0.5) : (Math.random()*0.06);
      const lvl = Math.min(1, base + wobble);
      setMicLvl(lvl);
      setMicPeak(p => Math.max(lvl, p*0.92));
    }, 80);
    return ()=>clearInterval(i);
  },[recState]);

  // transcript streaming
  const scriptIdxRef = useRef(0);
  const wordIdxRef = useRef(0);
  const lastWordAtRef = useRef(0);
  useEffect(()=>{
    if(recState !== "rec") return;
    let id;
    const tick = ()=>{
      const t = performance.now();
      if(t - lastWordAtRef.current > (70 + Math.random()*180)){
        lastWordAtRef.current = t;
        // append next word
        setTranscript(prev => {
          const next = [...prev];
          const line = TRANSCRIPT_SCRIPT[scriptIdxRef.current % TRANSCRIPT_SCRIPT.length];
          const words = line.split(" ");
          const curIdx = wordIdxRef.current;
          if(curIdx === 0){
            const ts = fmtTime(baseRef.current + (performance.now() - (startedAtRef.current||performance.now()))).hms;
            next.push({ ts, text: words[0], partial: true });
          } else if(curIdx < words.length){
            const last = next[next.length-1];
            next[next.length-1] = { ...last, text: last.text + " " + words[curIdx] };
          }
          wordIdxRef.current = curIdx + 1;
          if(wordIdxRef.current >= words.length){
            // finalize
            const last = next[next.length-1];
            next[next.length-1] = { ...last, partial: false };
            scriptIdxRef.current = (scriptIdxRef.current + 1) % TRANSCRIPT_SCRIPT.length;
            wordIdxRef.current = 0;
            lastWordAtRef.current = t + 200; // small gap between lines
          }
          return next;
        });
      }
      id = requestAnimationFrame(tick);
    };
    id = requestAnimationFrame(tick);
    return ()=>cancelAnimationFrame(id);
  },[recState]);

  // auto-scroll transcript
  const txRef = useRef(null);
  useEffect(()=>{
    if(txRef.current) txRef.current.scrollTop = txRef.current.scrollHeight;
  },[transcript]);

  // controls
  const startRec = useCallback(()=>{
    if(recState === "idle"){
      baseRef.current = 0;
      setElapsed(0);
      setTranscript([]);
      scriptIdxRef.current = 0;
      wordIdxRef.current = 0;
    }
    setRecState("rec");
  },[recState]);
  const pauseRec = useCallback(()=>{
    if(recState === "rec") setRecState("paused");
    else if(recState === "paused") setRecState("rec");
  },[recState]);
  const stopRec = useCallback(()=>{
    if(recState === "idle") return;
    // save file
    const ms = elapsed;
    const d = new Date();
    const slug = "rec-" + pad(d.getHours()) + pad(d.getMinutes()) + ".wav";
    setFiles(prev => [{
      date: fmtDateYMD(d),
      name: slug,
      dur: fmtTime(ms).hms,
      sz: bytesFromMs(ms),
    }, ...prev]);
    setRecState("idle");
    baseRef.current = 0;
    setTimeout(()=>setElapsed(0), 50);
    setTranscript([]);
  },[recState, elapsed]);

  // keyboard
  useEffect(()=>{
    const onKey = (e)=>{
      if(e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
      if(e.key === " "){ e.preventDefault();
        if(recState === "idle") startRec();
        else pauseRec();
      } else if(e.key === "F5" || e.key === "r" || e.key === "R"){ e.preventDefault(); startRec(); }
      else if(e.key === "F6" || e.key === "s" || e.key === "S"){ e.preventDefault(); stopRec(); }
      else if(e.key === "p" || e.key === "P"){ e.preventDefault(); pauseRec(); }
    };
    window.addEventListener("keydown", onKey);
    return ()=>window.removeEventListener("keydown", onKey);
  },[recState, startRec, pauseRec, stopRec]);

  const tFmt = fmtTime(elapsed);
  const stateClass = recState === "rec" ? "state-rec" : recState === "paused" ? "state-paused" : "state-idle";
  const stateLabel = recState === "rec" ? "REC" : recState === "paused" ? "PAUSED" : "IDLE";

  return (
    <>
      {/* TITLE BAR */}
      <div className="titlebar">
        <div className="left">
          <span className="brand">rekk</span>
          <span className="meta">v0.8.3 · session #0047</span>
        </div>
        <div className="right">
          <span style={{marginRight:"1em"}}>{fmtDateYMD(now)} {fmtNowClock(now)}</span>
          <span className="winbtn">_</span>
          <span className="winbtn">▢</span>
          <span className="winbtn">×</span>
        </div>
      </div>

      {/* PROMPT */}
      <div className="prompt">
        <span>user@rekkbox</span><span>:</span><span>~/recordings</span><span>$</span>
        <span className="cmd">rekk --new --device=builtin --fmt=wav --rate=48k</span>
        <span className="cursor">&nbsp;</span>
      </div>

      {/* MAIN GRID */}
      <div className="main">

        {/* TIMER */}
        <div className={"panel timer " + stateClass}>
          <span className="ptitle">┤ timer ├</span>
          <div className="timer-inner">
            <div className="timer-big" style={t.timerFont === "vt323" ? {fontFamily:"'VT323',monospace",fontSize:"clamp(36px,6vw,88px)"} : null}>
              {tFmt.hms}<span className="ms">.{tFmt.t}</span>
            </div>
            <div className="timer-status">
              <div className="status-row">
                <span className="recdot" />
                <span className={"badge badge-" + stateLabel.toLowerCase()}>{stateLabel}</span>
              </div>
              <div className="status-row" style={{color:"var(--dim)",fontSize:".82em"}}>
                {recState === "idle" ? "ready · press [space]" :
                 recState === "rec" ? "writing to /tmp/rekk-0047.wav" :
                 "buffer held · 4.2 MB"}
              </div>
              <div className="status-row" style={{color:"var(--dim)",fontSize:".82em"}}>
                disk free · 248 GB
              </div>
            </div>
          </div>
        </div>

        {/* INPUT */}
        <div className="panel input">
          <span className="ptitle">┤ input ├</span>
          <div className="input-grid">
            <span className="k">device</span>  <span className="v">► Built-in Microphone (top)</span>
            <span className="k">format</span>  <span className="v">WAV / PCM 24-bit · 2ch</span>
            <span className="k">rate</span>    <span className="v">48 000 Hz</span>
            <span className="k">level</span>   <span className="v"><LevelMeter level={micLvl} peak={micPeak} /></span>
            <span className="k">gain</span>    <span className="v">+6.0 dB · agc off</span>
            <span className="k">monitor</span> <span className="v">muted · [m] toggle</span>
          </div>
        </div>

        {/* WAVEFORM */}
        <div className="panel wave">
          <span className="ptitle">┤ waveform · live ├</span>
          <pre ref={waveRef} style={{flex:1,minHeight:0}}>{waveAscii}</pre>
          <div className="axis">
            <span>0.00s</span>
            <span style={{color:"var(--dim)"}}>↳ 48kHz · {ASCII_RAMPS[t.asciiStyle] ? t.asciiStyle : "blocks"} ramp</span>
            <span>{fmtTime(elapsed).hms}</span>
          </div>
        </div>

        {/* TRANSCRIPT */}
        <div className="panel transcript">
          <span className="ptitle">┤ live transcript <span className="dot">· whisper.cpp · en</span> ├</span>
          <div className="body" ref={txRef} style={{lineHeight: t.transcriptDensity === "compact" ? 1.1 : t.transcriptDensity === "comfy" ? 1.35 : 1.2}}>
            {transcript.length === 0 ? (
              <div className="empty">
                {recState === "idle"
                  ? "// no active session · start recording to stream transcript"
                  : "// listening..."}
              </div>
            ) : transcript.map((l,i)=><TranscriptLine key={i} line={l} />)}
          </div>
        </div>

        {/* RECORDINGS */}
        <FilesPanel files={files} sel={selFile} onSel={setSelFile} />
      </div>

      {/* CONTROLS */}
      <div className="controls">
        <button className="btn danger" onClick={startRec} disabled={recState==="rec"}>
          ● REC<span className="btn-key">F5</span>
        </button>
        <button className="btn warn" onClick={pauseRec} disabled={recState==="idle"}>
          ⏸ {recState==="paused" ? "RESUME" : "PAUSE"}<span className="btn-key">P</span>
        </button>
        <button className="btn" onClick={stopRec} disabled={recState==="idle"}>
          ■ STOP &amp; SAVE<span className="btn-key">F6</span>
        </button>
        <span style={{flex:1}} />
        <button className="btn" disabled={!(selFile>=0)}>▶ PLAY</button>
        <button className="btn" disabled={!(selFile>=0)}>↗ EXPORT .TXT</button>
        <button className="btn" disabled={!(selFile>=0)}>✂ TRIM</button>
      </div>

      {/* BOTTOM BAR */}
      <div className="botbar">
        <div className="keys">
          <span><b>[F1]</b>help</span>
          <span><b>[F2]</b>new</span>
          <span><b>[F5]</b>rec</span>
          <span><b>[F6]</b>stop</span>
          <span><b>[space]</b>pause/resume</span>
          <span><b>[!]</b>mark</span>
          <span><b>[#]</b>chapter</span>
          <span><b>[@]</b>speaker</span>
          <span><b>[F10]</b>quit</span>
        </div>
        <div>cpu 12% · mem 84M · ▲ stable</div>
      </div>

      {/* TWEAKS */}
      <TweaksPanel>
        <TweakSection label="Phosphor" />
        <TweakColor
          label="Tube color"
          value={PHOSPHOR_PRESETS[t.phosphor].fg}
          options={Object.values(PHOSPHOR_PRESETS).map(p=>p.fg)}
          onChange={(v)=>{
            const key = Object.keys(PHOSPHOR_PRESETS).find(k=>PHOSPHOR_PRESETS[k].fg===v) || "green";
            setTweak("phosphor", key);
          }}
        />
        <TweakSection label="CRT" />
        <TweakSlider label="Scanlines" value={t.scanlines} min={0} max={0.5} step={0.02} unit=""
          onChange={(v)=>setTweak("scanlines", v)} />
        <TweakToggle label="CRT curve" value={t.curve}
          onChange={(v)=>setTweak("curve", v)} />
        <TweakSection label="Type" />
        <TweakRadio label="Timer font" value={t.timerFont} options={["8bit","vt323"]}
          onChange={(v)=>setTweak("timerFont", v)} />
        <TweakSelect label="Waveform ramp" value={t.asciiStyle}
          options={Object.keys(ASCII_RAMPS)}
          onChange={(v)=>setTweak("asciiStyle", v)} />
        <TweakRadio label="Transcript" value={t.transcriptDensity}
          options={["compact","comfy"]}
          onChange={(v)=>setTweak("transcriptDensity", v)} />
        <TweakSection label="Demo" />
        <TweakButton label={recState==="idle" ? "Start recording" : "Stop recording"}
          onClick={()=>recState==="idle" ? startRec() : stopRec()} />
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>

</body>
</html>
