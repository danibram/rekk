<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>rekk — mini</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Press+Start+2P&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

<style>
  :root{
    /* LCD phosphor */
    --lcd-bg:#0c1a10;
    --lcd-bg-deep:#06100a;
    --lcd-fg:#7dff9a;
    --lcd-fg-bright:#d4ffd6;
    --lcd-dim:#2a6a3a;
    --lcd-dimmer:#143a20;
    --lcd-glow-rgb:125,255,154;

    /* Body / chassis */
    --case:#161618;
    --case-light:#222226;
    --case-edge:#050506;
    --ink:#cfd1d4;
    --ink-dim:#7a7a7c;
    --ink-dimmer:#4a4a4c;
    --accent-red:#ff4040;
    --accent-amber:#ffb84d;
  }

  *,*::before,*::after{box-sizing:border-box}
  html,body{height:100%;margin:0;background:#0a0a0c}
  body{
    font-family:'IBM Plex Mono',ui-monospace,monospace;
    color:var(--ink);
    background:
      radial-gradient(ellipse at 50% 30%, #18191c 0%, #0b0c0e 60%, #050506 100%);
    -webkit-font-smoothing:antialiased;
    overflow:hidden;
  }

  /* stage */
  .stage{
    position:fixed;inset:0;
    display:grid;place-items:center;
    padding:24px;
  }
  .stage::before{
    content:"";position:absolute;inset:0;pointer-events:none;
    background:
      radial-gradient(ellipse 50vw 24vh at 50% 70%, rgba(0,0,0,.55), transparent 70%),
      repeating-linear-gradient(45deg, rgba(255,255,255,.008) 0 2px, transparent 2px 4px);
  }

  /* the device */
  .device{
    position:relative;z-index:2;
    width:min(440px, 96vw);
    display:flex;flex-direction:column;
    background:linear-gradient(180deg,
      color-mix(in oklch, var(--case), white 4%) 0%,
      var(--case) 40%,
      var(--case) 70%,
      color-mix(in oklch, var(--case), black 18%) 100%);
    border:1px solid var(--case-edge);
    border-radius:14px;
    padding:10px 12px 12px;
    box-shadow:
      0 1px 0 rgba(255,255,255,.07) inset,
      0 -1px 0 rgba(0,0,0,.5) inset,
      0 0 0 1px rgba(0,0,0,.4),
      0 14px 32px -8px rgba(0,0,0,.7),
      0 32px 70px -16px rgba(0,0,0,.8);
  }

  /* top brand strip */
  .topbar{
    display:flex;align-items:center;justify-content:space-between;
    padding:2px 4px 8px;
    border-bottom:1px solid color-mix(in oklch, var(--case), black 20%);
    margin-bottom:10px;
  }
  .brand{
    font-family:'Press Start 2P',monospace;
    font-size:11px;letter-spacing:.04em;color:var(--ink);
    display:flex;align-items:baseline;gap:8px;
  }
  .brand small{
    font-family:'IBM Plex Mono',monospace;
    font-size:8.5px;color:var(--ink-dim);
    letter-spacing:.18em;text-transform:uppercase;
    font-weight:400;
  }
  .state-pill{
    display:inline-flex;align-items:center;gap:6px;
    font-family:'IBM Plex Mono',monospace;
    font-size:9px;letter-spacing:.12em;text-transform:uppercase;
    color:var(--ink-dim);
  }
  .state-pill .dot{
    width:7px;height:7px;border-radius:50%;
    background:var(--ink-dimmer);
  }
  .state-rec .state-pill .dot{background:var(--accent-red);box-shadow:0 0 4px var(--accent-red), 0 0 9px var(--accent-red);animation:pulse 1s infinite}
  .state-paused .state-pill .dot{background:var(--accent-amber);box-shadow:0 0 4px var(--accent-amber)}
  .state-rec .state-pill{color:var(--ink)}
  .state-paused .state-pill{color:var(--ink)}
  @keyframes pulse{50%{opacity:.25}}

  /* LCD strip */
  .lcd{
    position:relative;
    background:linear-gradient(180deg, var(--lcd-bg-deep) 0%, var(--lcd-bg) 100%);
    border:1px solid #000;
    border-radius:4px;
    padding:8px 10px;
    color:var(--lcd-fg);
    font-family:'VT323','IBM Plex Mono',monospace;
    box-shadow:
      0 0 0 1px rgba(255,255,255,.05) inset,
      0 1px 3px rgba(0,0,0,.7) inset;
    overflow:hidden;
    display:grid;
    grid-template-columns:auto 1fr auto;
    grid-template-rows:auto auto;
    column-gap:12px;
    row-gap:3px;
    align-items:center;
  }
  .lcd::before{
    content:"";position:absolute;inset:0;pointer-events:none;
    background:repeating-linear-gradient(to bottom, transparent 0 2px, rgba(0,0,0,.22) 2px 3px);
    mix-blend-mode:multiply;
  }
  .lcd::after{
    content:"";position:absolute;inset:0;pointer-events:none;
    background:radial-gradient(ellipse at 50% 50%, transparent 60%, rgba(0,0,0,.45) 100%);
  }

  .lcd-time{
    grid-column:1;grid-row:1;
    font-family:'Press Start 2P',monospace;
    font-size:20px;
    color:var(--lcd-fg-bright);
    letter-spacing:.04em;line-height:1;
    text-shadow:
      0 0 1px currentColor,
      0 0 6px rgba(var(--lcd-glow-rgb),.7),
      0 0 14px rgba(var(--lcd-glow-rgb),.3);
    position:relative;z-index:2;
  }
  .lcd-time .ms{
    font-family:'VT323',monospace;
    font-size:.6em;color:var(--lcd-fg);opacity:.85;margin-left:.18em;
  }
  .lcd-remain{
    grid-column:1;grid-row:2;
    font-family:'VT323',monospace;
    font-size:12px;color:var(--lcd-dim);
    letter-spacing:.06em;line-height:1;
    position:relative;z-index:2;
    text-shadow:0 0 4px rgba(var(--lcd-glow-rgb),.3);
  }

  .lcd-wave{
    grid-column:2;grid-row:1;
    position:relative;z-index:2;
    min-width:0;
  }
  .lcd-wave pre{
    margin:0;
    font-family:'VT323','IBM Plex Mono',monospace;
    font-size:11px;line-height:1;
    color:var(--lcd-fg-bright);
    white-space:pre;overflow:hidden;
    text-shadow:0 0 4px rgba(var(--lcd-glow-rgb),.55);
  }
  .lcd-meter{
    grid-column:2;grid-row:2;
    position:relative;z-index:2;
    display:flex;align-items:center;gap:6px;
    font-variant-numeric:tabular-nums;
    font-family:'VT323','IBM Plex Mono',monospace;
    font-size:13px;
    color:var(--lcd-dim);
    line-height:1;min-width:0;
  }
  .lcd-meter .bars{
    color:var(--lcd-dimmer);
    letter-spacing:0;
    overflow:hidden;white-space:nowrap;
    flex:1;min-width:0;
    text-shadow:0 0 3px rgba(var(--lcd-glow-rgb),.3);
  }
  .lcd-meter .bars .on{color:var(--lcd-fg-bright)}
  .lcd-meter .bars .mid{color:#ffd86b}
  .lcd-meter .bars .hot{color:#ff7373}
  .lcd-meter .db{
    color:var(--lcd-fg);
    font-family:'Press Start 2P',monospace;
    font-size:9px;
    min-width:3.6em;text-align:right;
    text-shadow:0 0 3px rgba(var(--lcd-glow-rgb),.4);
  }

  .lcd-right{
    grid-column:3;grid-row:1 / span 2;
    position:relative;z-index:2;
    display:flex;flex-direction:column;align-items:flex-end;
    gap:4px;
    font-family:'Press Start 2P',monospace;
    line-height:1;
  }
  .lcd-state{
    font-size:10px;
    color:var(--lcd-fg-bright);
    letter-spacing:.08em;
    display:inline-flex;align-items:center;gap:5px;
    text-shadow:0 0 4px rgba(var(--lcd-glow-rgb),.6);
  }
  .lcd-state .recdot{
    display:inline-block;width:7px;height:7px;border-radius:50%;
    background:#ff5c5c;box-shadow:0 0 4px #ff5c5c, 0 0 8px #ff5c5c;
  }
  .state-paused .lcd-state .recdot{background:#ffb84d;box-shadow:0 0 4px #ffb84d}
  .state-idle .lcd-state .recdot{background:var(--lcd-dim);box-shadow:none}
  .state-rec .lcd-state .recdot{animation:pulse 1s infinite}
  .lcd-session{
    font-family:'VT323',monospace;font-size:11px;
    color:var(--lcd-dim);letter-spacing:.06em;
  }

  /* controls row */
  .controls{
    display:flex;align-items:center;gap:6px;
    margin-top:12px;
    padding:7px 8px;
    background:linear-gradient(180deg,#202022,#141416);
    border:1px solid #050506;
    border-radius:8px;
    box-shadow:
      0 1px 0 rgba(255,255,255,.05) inset,
      0 -1px 0 rgba(0,0,0,.5) inset;
  }
  .ctl{
    appearance:none;border:0;
    flex:1;height:36px;
    border-radius:4px;
    background:linear-gradient(180deg,#3a3a3e 0%, #28282c 50%, #1c1c20 100%);
    box-shadow:
      0 1px 0 rgba(255,255,255,.16) inset,
      0 -2px 2px rgba(0,0,0,.55) inset,
      0 2px 0 rgba(0,0,0,.5),
      0 3px 6px rgba(0,0,0,.4);
    color:#e8e8ea;
    font-family:'Press Start 2P',monospace;
    font-size:10px;
    display:inline-flex;align-items:center;justify-content:center;
    cursor:pointer;
    transition:transform .08s, box-shadow .08s;
    position:relative;
  }
  .ctl:hover{background:linear-gradient(180deg,#444448 0%, #2c2c30 50%, #1e1e22 100%)}
  .ctl:active{
    transform:translateY(2px);
    box-shadow:
      0 1px 0 rgba(255,255,255,.06) inset,
      0 -1px 2px rgba(0,0,0,.5) inset,
      0 1px 2px rgba(0,0,0,.4);
  }
  .ctl:disabled{opacity:.45;cursor:not-allowed}
  .ctl.rec{color:#ff5c5c}
  .ctl.rec.armed{
    background:linear-gradient(180deg,#5c1a1a 0%, #c92020 50%, #8a0e0e 100%);
    color:#fff;
    box-shadow:
      0 1px 0 rgba(255,255,255,.3) inset,
      0 -2px 2px rgba(0,0,0,.45) inset,
      0 2px 0 rgba(0,0,0,.5),
      0 0 10px rgba(255,64,64,.7),
      0 0 24px rgba(255,64,64,.35);
    animation:recglow 1s infinite;
  }
  @keyframes recglow{
    50%{box-shadow:
      0 1px 0 rgba(255,255,255,.3) inset,
      0 -2px 2px rgba(0,0,0,.45) inset,
      0 2px 0 rgba(0,0,0,.5),
      0 0 16px rgba(255,64,64,.9),
      0 0 32px rgba(255,64,64,.5);}
  }

  .ctl.files{
    flex:0 0 auto;
    width:46px;
    margin-left:6px;
    background:linear-gradient(180deg,#2a2a2e 0%, #1c1c20 100%);
    color:var(--lcd-fg-bright);
    border:1px solid #000;
    box-shadow:
      0 1px 0 rgba(255,255,255,.1) inset,
      0 -1px 2px rgba(0,0,0,.45) inset,
      0 2px 0 rgba(0,0,0,.5);
  }
  .ctl.files.on{
    background:linear-gradient(180deg,#0c1a10 0%, #06100a 100%);
    color:var(--lcd-fg-bright);
    box-shadow:
      0 1px 0 rgba(125,255,154,.15) inset,
      0 0 0 1px rgba(125,255,154,.2) inset,
      0 0 10px rgba(125,255,154,.3),
      0 1px 2px rgba(0,0,0,.5);
    text-shadow:0 0 4px rgba(var(--lcd-glow-rgb),.7);
  }
  .ctl-sep{
    width:1px;height:24px;
    background:#0a0a0c;
    box-shadow:1px 0 0 rgba(255,255,255,.04);
    margin:0 2px;
  }

  /* drawer (files / transcript) */
  .drawer{
    overflow:hidden;
    max-height:0;
    transition:max-height .35s cubic-bezier(.4,0,.2,1), margin-top .35s;
    margin-top:0;
  }
  .drawer.open{
    max-height:520px;
    margin-top:10px;
  }
  .drawer-inner{
    background:linear-gradient(180deg, var(--lcd-bg-deep) 0%, var(--lcd-bg) 100%);
    border:1px solid #000;
    border-radius:4px;
    box-shadow:
      0 0 0 1px rgba(255,255,255,.05) inset,
      0 1px 3px rgba(0,0,0,.7) inset;
    color:var(--lcd-fg);
    font-family:'VT323','IBM Plex Mono',monospace;
    position:relative;
    overflow:hidden;
  }
  .drawer-inner::before{
    content:"";position:absolute;inset:0;pointer-events:none;
    background:repeating-linear-gradient(to bottom, transparent 0 2px, rgba(0,0,0,.18) 2px 3px);
    mix-blend-mode:multiply;
    z-index:1;
  }
  .drawer-head{
    display:flex;align-items:center;justify-content:space-between;
    padding:7px 10px;
    border-bottom:1px solid color-mix(in oklch, var(--lcd-bg), white 6%);
    font-family:'Press Start 2P',monospace;
    font-size:9px;letter-spacing:.1em;
    color:var(--lcd-fg-bright);
    text-shadow:0 0 4px rgba(var(--lcd-glow-rgb),.5);
    position:relative;z-index:2;
  }
  .drawer-head .crumbs{display:flex;align-items:center;gap:8px}
  .drawer-head .crumbs button{
    appearance:none;background:transparent;border:0;
    color:var(--lcd-dim);
    font-family:inherit;font-size:inherit;letter-spacing:inherit;
    cursor:pointer;padding:0;
  }
  .drawer-head .crumbs button:hover{color:var(--lcd-fg-bright)}
  .drawer-head .crumbs .sep{color:var(--lcd-dim)}
  .drawer-head .close{
    appearance:none;background:transparent;border:1px solid var(--lcd-dim);
    color:var(--lcd-dim);
    width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;
    font-family:'IBM Plex Mono',monospace;font-size:11px;
    border-radius:2px;cursor:pointer;
  }
  .drawer-head .close:hover{color:var(--lcd-fg-bright);border-color:var(--lcd-fg-bright)}

  /* files list */
  .files-list{
    position:relative;z-index:2;
    max-height:420px;overflow-y:auto;
    scrollbar-width:thin;
    scrollbar-color:var(--lcd-dim) transparent;
  }
  .files-list::-webkit-scrollbar{width:6px}
  .files-list::-webkit-scrollbar-thumb{background:var(--lcd-dim);border-radius:3px}
  .files-head{
    display:grid;
    grid-template-columns:64px 1fr 50px 26px;
    gap:8px;
    padding:4px 10px;
    font-family:'IBM Plex Mono',monospace;
    font-size:9px;letter-spacing:.12em;text-transform:uppercase;
    color:var(--lcd-dimmer);
    border-bottom:1px dashed var(--lcd-dimmer);
  }
  .file-row{
    display:grid;
    grid-template-columns:64px 1fr 50px 26px;
    gap:8px;align-items:center;
    padding:6px 10px;
    font-family:'VT323','IBM Plex Mono',monospace;
    font-size:14px;line-height:1.1;
    border-bottom:1px solid color-mix(in oklch, var(--lcd-bg), white 3%);
    cursor:pointer;
    transition:background .08s;
  }
  .file-row:hover{background:rgba(125,255,154,.06)}
  .file-row .date{color:var(--lcd-dim);font-size:12px;letter-spacing:.04em}
  .file-row .name{
    color:var(--lcd-fg-bright);
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
    text-shadow:0 0 4px rgba(var(--lcd-glow-rgb),.3);
  }
  .file-row .name::before{content:"► ";color:var(--lcd-fg);opacity:.7}
  .file-row .dur{color:var(--lcd-fg);font-variant-numeric:tabular-nums;text-align:right;font-size:13px}
  .file-row .go{
    color:var(--lcd-dim);text-align:right;
    font-family:'IBM Plex Mono',monospace;font-size:11px;
  }
  .file-row:hover .go{color:var(--lcd-fg-bright)}

  /* transcript view */
  .transcript-view{
    position:relative;z-index:2;
    display:flex;flex-direction:column;
    max-height:480px;
  }
  .transcript-meta{
    padding:8px 10px;
    border-bottom:1px solid color-mix(in oklch, var(--lcd-bg), white 4%);
    font-family:'VT323','IBM Plex Mono',monospace;
    font-size:12px;
    color:var(--lcd-dim);
    display:flex;justify-content:space-between;gap:12px;
    flex-wrap:wrap;
  }
  .transcript-meta b{color:var(--lcd-fg-bright);font-weight:normal;text-shadow:0 0 4px rgba(var(--lcd-glow-rgb),.3)}
  .transcript-body{
    padding:8px 10px 10px;
    overflow-y:auto;
    max-height:360px;
    scrollbar-width:thin;
    scrollbar-color:var(--lcd-dim) transparent;
    font-family:'VT323','IBM Plex Mono',monospace;
  }
  .transcript-body::-webkit-scrollbar{width:6px}
  .transcript-body::-webkit-scrollbar-thumb{background:var(--lcd-dim);border-radius:3px}
  .t-line{
    display:flex;gap:8px;
    font-size:14px;line-height:1.3;
    margin-bottom:2px;
  }
  .t-line .ts{
    flex:0 0 auto;
    color:var(--lcd-dimmer);
    font-size:12px;
    font-variant-numeric:tabular-nums;
  }
  .t-line .text{color:var(--lcd-fg-bright);text-shadow:0 0 3px rgba(var(--lcd-glow-rgb),.25)}
  .t-line .text.partial{color:var(--lcd-fg);opacity:.85}
  .t-cursor{
    display:inline-block;width:.5em;height:.85em;
    background:var(--lcd-fg-bright);
    vertical-align:text-bottom;margin-left:2px;
    animation:blink 1.05s steps(1) infinite;
  }
  @keyframes blink{50%{opacity:0}}

  .transcript-empty{
    padding:14px 12px;
    color:var(--lcd-dim);
    font-family:'VT323',monospace;font-size:13px;
    text-align:center;
  }
  .transcript-empty button{
    margin-top:8px;
    appearance:none;background:transparent;
    border:1px solid var(--lcd-fg);color:var(--lcd-fg-bright);
    font-family:'Press Start 2P',monospace;font-size:9px;
    padding:6px 12px;border-radius:3px;cursor:pointer;
    letter-spacing:.06em;
    text-shadow:0 0 4px rgba(var(--lcd-glow-rgb),.5);
    box-shadow:0 0 8px rgba(125,255,154,.15) inset;
  }
  .transcript-empty button:hover{
    background:rgba(125,255,154,.1);
    box-shadow:0 0 12px rgba(125,255,154,.3) inset, 0 0 10px rgba(125,255,154,.3);
  }

  .transcript-foot{
    border-top:1px solid color-mix(in oklch, var(--lcd-bg), white 4%);
    padding:6px 10px;
    display:flex;justify-content:space-between;align-items:center;
    font-family:'IBM Plex Mono',monospace;font-size:10px;
    color:var(--lcd-dim);letter-spacing:.06em;
  }
  .t-status{display:inline-flex;align-items:center;gap:5px}
  .t-status .dot{
    width:6px;height:6px;border-radius:50%;background:var(--lcd-fg);
    box-shadow:0 0 4px var(--lcd-fg);
    animation:pulse 1s infinite;
  }
  .t-actions{display:flex;gap:6px}
  .t-actions button{
    appearance:none;background:transparent;border:1px solid var(--lcd-dim);
    color:var(--lcd-dim);
    font-family:'IBM Plex Mono',monospace;font-size:9.5px;
    padding:2px 7px;letter-spacing:.08em;cursor:pointer;
    border-radius:2px;
  }
  .t-actions button:hover{color:var(--lcd-fg-bright);border-color:var(--lcd-fg)}

  /* foot of device */
  .deviceFoot{
    display:flex;justify-content:space-between;align-items:center;
    margin-top:10px;padding:0 2px;
    font-family:'IBM Plex Mono',monospace;
    font-size:9px;color:var(--ink-dimmer);
    letter-spacing:.14em;text-transform:uppercase;
  }
  .deviceFoot b{color:var(--ink-dim);font-weight:500}

</style>
</head>
<body>

<div class="stage" id="stage">
  <div id="root"></div>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

// ── data ─────────────────────────────────────────────────
const TRANSCRIPT_SCRIPT = [
  "ok so the basic idea behind rekk is that we're treating",
  "the recorder as a terminal first, not as a button.",
  "you spawn a new session like you'd spawn a process —",
  "rekk --new, give it a slug, hit space to start,",
  "and it just streams audio frames into whisper.cpp",
  "running locally on the m-series neural engine.",
  "no cloud round-trip, no privacy posture to maintain,",
  "no quota meter ticking down in the corner.",
  "the transcript is just a text file growing on disk,",
  "you can tail -f it from another shell if you want.",
  "we keep the original wav at 48k 24-bit lossless,",
  "ffmpeg pipes it into a flac archive at end-of-session.",
];

const SEED_FILES = [
  { date:"05-19", name:"morning-standup.wav",    dur:"14:22", sz:"82M"  },
  { date:"05-18", name:"interview-mira-04.wav",  dur:"62:11", sz:"358M" },
  { date:"05-18", name:"voice-memo-shower.wav",  dur:"02:48", sz:"16M"  },
  { date:"05-17", name:"podcast-ep07-rough.wav", dur:"47:09", sz:"271M" },
  { date:"05-15", name:"field-rec-park.wav",     dur:"08:31", sz:"49M"  },
  { date:"05-14", name:"call-w-jordan.wav",      dur:"33:52", sz:"194M" },
  { date:"05-12", name:"song-idea-Cmaj.wav",     dur:"01:14", sz:"7M"   },
  { date:"05-11", name:"lecture-week-12.wav",    dur:"108:00",sz:"619M" },
];

const LCD_PRESETS = {
  green: { bg:"#0c1a10", bgDeep:"#06100a", fg:"#7dff9a", fgBright:"#d4ffd6", dim:"#2a6a3a", dimmer:"#143a20", glowRGB:"125,255,154" },
  amber: { bg:"#1a1006", bgDeep:"#0e0803", fg:"#ffc466", fgBright:"#ffe8b8", dim:"#7a5212", dimmer:"#3a2a08", glowRGB:"255,196,102" },
  cyan:  { bg:"#061418", bgDeep:"#040c0e", fg:"#7df0ff", fgBright:"#d4f9ff", dim:"#2a667a", dimmer:"#10353f", glowRGB:"125,240,255" },
  red:   { bg:"#1a0808", bgDeep:"#0e0404", fg:"#ff7a7a", fgBright:"#ffd4d4", dim:"#7a2a2a", dimmer:"#3a1010", glowRGB:"255,122,122" },
};

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "lcd": "green",
  "autoOpenOnRec": true
}/*EDITMODE-END*/;

// ── helpers ──────────────────────────────────────────────
const pad = (n, w=2) => String(n).padStart(w,"0");
function fmtTime(ms){
  const m = Math.floor(ms/60000);
  const s = Math.floor((ms%60000)/1000);
  const t = Math.floor((ms%1000)/100);
  return { ms: `${pad(m)}:${pad(s)}`, t, full: `${pad(Math.floor(m/60))}:${pad(m%60)}:${pad(s)}` };
}

// ── ascii waveform ───────────────────────────────────────
const RAMP = ["·","▁","▂","▃","▄","▅","▆","▇","█"];
function genCols(t, n, amp){
  const cols = new Array(n);
  for(let i=0;i<n;i++){
    const x = i + t*60;
    const a = Math.sin(x*0.21)*0.55 + Math.sin(x*0.07 + t*1.3)*0.35 + Math.sin(x*0.43 + t*2.1)*0.20;
    const noise = (Math.sin(x*3.1+t*7)+Math.sin(x*5.9+t*11)) * 0.08;
    let v = Math.abs(a + noise) * amp;
    if(v>1) v=1;
    cols[i] = Math.round(v * (RAMP.length-1));
  }
  return cols;
}
function renderWave(cols, rows){
  const max = RAMP.length-1;
  const half = Math.floor(rows/2);
  const out = [];
  for(let r=0;r<rows;r++){
    let line = "";
    const dist = Math.abs(r - half) / half;
    for(let c=0;c<cols.length;c++){
      const norm = cols[c]/max;
      if(norm >= dist - 0.02){
        const span = norm - dist;
        line += RAMP[Math.max(0, Math.min(max, Math.round(span * max * 1.4)))];
      } else line += " ";
    }
    out.push(line);
  }
  return out.join("\n");
}

// ── meter cells (inline) ─────────────────────────────────
function meterCells(level, N){
  const lit = Math.round(level * N);
  const cells = [];
  for(let i=0;i<N;i++){
    let cls = "";
    if(i < lit){
      if(i < N*0.6) cls = "on";
      else if(i < N*0.85) cls = "mid";
      else cls = "hot";
    }
    cells.push(<span key={i} className={cls}>{i<lit ? "█" : "░"}</span>);
  }
  return cells;
}

// ── App ──────────────────────────────────────────────────
function App(){
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [recState, setRecState] = useState("idle"); // idle | rec | paused
  const [elapsed, setElapsed] = useState(0);
  const [waveT, setWaveT] = useState(0);
  const [micLvl, setMicLvl] = useState(0.05);
  const [drawer, setDrawer] = useState("closed"); // closed | files | transcript
  const [activeFile, setActiveFile] = useState(null);
  const [transcript, setTranscript] = useState([]); // {ts, text, partial}
  const [files] = useState(SEED_FILES);

  // apply LCD preset
  useEffect(()=>{
    const l = LCD_PRESETS[t.lcd] || LCD_PRESETS.green;
    const r = document.documentElement;
    r.style.setProperty("--lcd-bg", l.bg);
    r.style.setProperty("--lcd-bg-deep", l.bgDeep);
    r.style.setProperty("--lcd-fg", l.fg);
    r.style.setProperty("--lcd-fg-bright", l.fgBright);
    r.style.setProperty("--lcd-dim", l.dim);
    r.style.setProperty("--lcd-dimmer", l.dimmer);
    r.style.setProperty("--lcd-glow-rgb", l.glowRGB);
  },[t.lcd]);

  // elapsed timer
  const startRef = useRef(null);
  const baseRef = useRef(0);
  useEffect(()=>{
    if(recState !== "rec") return;
    startRef.current = performance.now();
    let id;
    const tick = ()=>{
      setElapsed(baseRef.current + (performance.now() - startRef.current));
      id = requestAnimationFrame(tick);
    };
    id = requestAnimationFrame(tick);
    return ()=>{
      cancelAnimationFrame(id);
      baseRef.current = baseRef.current + (performance.now() - startRef.current);
    };
  },[recState]);

  // waveform clock
  const ampTarget = recState==="rec" ? 0.92 : recState==="paused" ? 0.18 : 0.06;
  const ampRef = useRef(0.06);
  useEffect(()=>{
    let id, last = performance.now();
    const tick = (now)=>{
      const dt = Math.min(100, now - last) / 1000;
      last = now;
      ampRef.current += (ampTarget - ampRef.current) * Math.min(1, dt*4);
      setWaveT(p => p + dt * (recState==="rec" ? 1 : 0.12));
      id = requestAnimationFrame(tick);
    };
    id = requestAnimationFrame(tick);
    return ()=>cancelAnimationFrame(id);
  },[ampTarget, recState]);

  // mic level
  useEffect(()=>{
    const i = setInterval(()=>{
      const base = recState==="rec" ? 0.55 : recState==="paused" ? 0.1 : 0.05;
      const wob = recState==="rec" ? (Math.random()*0.45) : (Math.random()*0.05);
      setMicLvl(Math.min(1, base + wob));
    }, 90);
    return ()=>clearInterval(i);
  },[recState]);

  // measure waveform size in the LCD
  const waveRef = useRef(null);
  const [dims, setDims] = useState({cols:42, rows:3});
  useEffect(()=>{
    if(!waveRef.current) return;
    const measure = ()=>{
      const el = waveRef.current;
      if(!el) return;
      const probe = document.createElement("span");
      probe.style.font = getComputedStyle(el).font;
      probe.style.visibility = "hidden";
      probe.style.position = "absolute";
      probe.textContent = "M".repeat(40);
      document.body.appendChild(probe);
      const charW = probe.getBoundingClientRect().width / 40;
      document.body.removeChild(probe);
      const w = el.clientWidth;
      const cols = Math.max(20, Math.floor(w / charW) - 1);
      setDims({cols, rows: 3});
    };
    measure();
    const ro = new ResizeObserver(measure);
    ro.observe(waveRef.current);
    window.addEventListener("resize", measure);
    return ()=>{ro.disconnect();window.removeEventListener("resize", measure)};
  },[]);
  const waveStr = useMemo(()=>{
    return renderWave(genCols(waveT, dims.cols, ampRef.current), dims.rows);
  },[waveT, dims]);

  // streaming transcript when recording AND transcript drawer open with current session
  const scriptIdxRef = useRef(0);
  const wordIdxRef = useRef(0);
  const lastWordAtRef = useRef(0);
  const liveSession = activeFile === null && recState === "rec";
  useEffect(()=>{
    if(recState !== "rec") return;
    let id;
    const tick = ()=>{
      const now = performance.now();
      if(now - lastWordAtRef.current > (70 + Math.random()*180)){
        lastWordAtRef.current = now;
        setTranscript(prev => {
          const next = [...prev];
          const line = TRANSCRIPT_SCRIPT[scriptIdxRef.current % TRANSCRIPT_SCRIPT.length];
          const words = line.split(" ");
          const curIdx = wordIdxRef.current;
          if(curIdx === 0){
            const ts = fmtTime(baseRef.current + (now - (startRef.current||now))).full;
            next.push({ ts, text: words[0], partial:true });
          } else if(curIdx < words.length){
            const last = next[next.length-1];
            next[next.length-1] = { ...last, text: last.text + " " + words[curIdx] };
          }
          wordIdxRef.current = curIdx + 1;
          if(wordIdxRef.current >= words.length){
            const last = next[next.length-1];
            next[next.length-1] = { ...last, partial:false };
            scriptIdxRef.current = (scriptIdxRef.current+1) % TRANSCRIPT_SCRIPT.length;
            wordIdxRef.current = 0;
            lastWordAtRef.current = now + 200;
          }
          return next;
        });
      }
      id = requestAnimationFrame(tick);
    };
    id = requestAnimationFrame(tick);
    return ()=>cancelAnimationFrame(id);
  },[recState]);

  // auto-scroll transcript
  const txRef = useRef(null);
  useEffect(()=>{
    if(txRef.current) txRef.current.scrollTop = txRef.current.scrollHeight;
  },[transcript, drawer]);

  // controls
  const startRec = useCallback(()=>{
    if(recState === "idle"){
      baseRef.current = 0;
      setElapsed(0);
      setTranscript([]);
      scriptIdxRef.current = 0;
      wordIdxRef.current = 0;
      setActiveFile(null);
      if(t.autoOpenOnRec) setDrawer("transcript");
    }
    setRecState("rec");
  },[recState, t.autoOpenOnRec]);
  const pauseRec = useCallback(()=>{
    if(recState === "rec") setRecState("paused");
    else if(recState === "paused") setRecState("rec");
  },[recState]);
  const stopRec = useCallback(()=>{
    if(recState === "idle") return;
    setRecState("idle");
    baseRef.current = 0;
    setTimeout(()=>setElapsed(0), 50);
  },[recState]);

  // keyboard
  useEffect(()=>{
    const onKey = (e)=>{
      if(e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
      if(e.key === " "){ e.preventDefault();
        if(recState === "idle") startRec();
        else pauseRec();
      } else if(e.key === "r" || e.key === "R"){ e.preventDefault(); startRec(); }
      else if(e.key === "Escape" || e.key === "s" || e.key === "S"){ e.preventDefault(); stopRec(); }
      else if(e.key === "f" || e.key === "F"){ e.preventDefault();
        setDrawer(d => d === "files" ? "closed" : "files");
      }
    };
    window.addEventListener("keydown", onKey);
    return ()=>window.removeEventListener("keydown", onKey);
  },[recState, startRec, pauseRec, stopRec]);

  // open transcript for a file (canned)
  const openTranscript = (file)=>{
    setActiveFile(file);
    // pre-fill a canned transcript so it feels real
    const lines = TRANSCRIPT_SCRIPT.slice(0, 8).map((text,i)=>({
      ts: fmtTime(i*7400 + 1200).full,
      text, partial:false,
    }));
    setTranscript(lines);
    setDrawer("transcript");
  };

  const openLive = ()=>{
    setActiveFile(null);
    setDrawer("transcript");
  };

  const tf = fmtTime(elapsed);
  const stateClass = recState === "rec" ? "state-rec" : recState === "paused" ? "state-paused" : "state-idle";
  const stateLabel = recState === "rec" ? "REC" : recState === "paused" ? "PAUSE" : "STOP";
  const stateText = recState === "rec" ? "RECORDING" : recState === "paused" ? "PAUSED" : "READY";

  const totalMs = 90*60*1000;
  const remainMs = Math.max(0, totalMs - elapsed);
  const remain = fmtTime(remainMs);

  // dB
  const dB = micLvl <= 0.001 ? "-∞" : (20*Math.log10(micLvl)).toFixed(0);

  return (
    <div className={"device " + stateClass}>

      <div className="topbar">
        <div className="brand">
          REKK<small>mini · m-88</small>
        </div>
        <div className="state-pill">
          <span className="dot" />{stateText}
        </div>
      </div>

      {/* LCD strip */}
      <div className="lcd">
        <div className="lcd-time">{tf.ms}<span className="ms">.{tf.t}</span></div>
        <div className="lcd-remain">-{remain.ms} REMAIN</div>

        <div className="lcd-wave">
          <pre ref={waveRef}>{waveStr}</pre>
        </div>
        <div className="lcd-meter">
          <span className="bars">{meterCells(micLvl, 20)}</span>
          <span className="db">{dB}dB</span>
        </div>

        <div className="lcd-right">
          <span className="lcd-state"><span className="recdot" />{stateLabel}</span>
          <span className="lcd-session">SES·0047</span>
        </div>
      </div>

      {/* Controls */}
      <div className="controls">
        <button className="ctl" title="rewind" disabled={recState!=="idle"}>◀◀</button>
        <button className="ctl" onClick={pauseRec} title="pause/resume · space" disabled={recState==="idle"}>❚❚</button>
        <button className="ctl" onClick={stopRec} title="stop · esc" disabled={recState==="idle"}>■</button>
        <button className={"ctl rec " + (recState==="rec" ? "armed" : "")}
                onClick={startRec} title="record · R">●</button>
        <button className="ctl" title="fast-forward" disabled={recState!=="idle"}>▶▶</button>
        <span className="ctl-sep" />
        <button className={"ctl files " + (drawer!=="closed" ? "on" : "")}
                onClick={()=>setDrawer(d => d==="closed" ? "files" : "closed")}
                title="files · F">▤</button>
      </div>

      {/* Drawer */}
      <div className={"drawer " + (drawer!=="closed" ? "open" : "")}>
        <div className="drawer-inner">
          <div className="drawer-head">
            <div className="crumbs">
              {drawer === "files" && <span>RECORDINGS · {files.length}</span>}
              {drawer === "transcript" && (
                <>
                  <button onClick={()=>setDrawer("files")}>◀ FILES</button>
                  <span className="sep">/</span>
                  <span>{activeFile ? "TRANSCRIPT" : "LIVE"}</span>
                </>
              )}
            </div>
            <button className="close" onClick={()=>setDrawer("closed")} title="close">×</button>
          </div>

          {drawer === "files" && (
            <>
              <div className="files-head">
                <span>date</span><span>file</span><span style={{textAlign:"right"}}>dur</span><span></span>
              </div>
              <div className="files-list">
                {files.map((f,i)=>(
                  <div key={i} className="file-row" onClick={()=>openTranscript(f)}>
                    <span className="date">{f.date}</span>
                    <span className="name">{f.name}</span>
                    <span className="dur">{f.dur}</span>
                    <span className="go">↗</span>
                  </div>
                ))}
                {recState !== "idle" && (
                  <div className="file-row" onClick={openLive} style={{background:"rgba(125,255,154,.04)"}}>
                    <span className="date" style={{color:"var(--lcd-fg)"}}>LIVE</span>
                    <span className="name">current-session.wav</span>
                    <span className="dur">{tf.ms}</span>
                    <span className="go">↗</span>
                  </div>
                )}
              </div>
            </>
          )}

          {drawer === "transcript" && (
            <div className="transcript-view">
              <div className="transcript-meta">
                <span>► <b>{activeFile ? activeFile.name : "current-session.wav"}</b></span>
                <span>{activeFile ? activeFile.dur : tf.ms} · whisper.cpp · en</span>
              </div>

              {transcript.length === 0 ? (
                <div className="transcript-empty">
                  no transcript yet for this session.<br/>
                  {!activeFile && recState === "idle" && (
                    <button onClick={startRec}>● START RECORDING</button>
                  )}
                  {activeFile && (
                    <button onClick={()=>{
                      const lines = TRANSCRIPT_SCRIPT.slice(0, 8).map((text,i)=>({
                        ts: fmtTime(i*7400 + 1200).full,
                        text, partial:false,
                      }));
                      setTranscript(lines);
                    }}>▶ RUN TRANSCRIPT</button>
                  )}
                </div>
              ) : (
                <div className="transcript-body" ref={txRef}>
                  {transcript.map((l, i)=>(
                    <div key={i} className="t-line">
                      <span className="ts">{l.ts}</span>
                      <span className={"text " + (l.partial?"partial":"")}>
                        {l.text}
                        {l.partial && <span className="t-cursor" />}
                      </span>
                    </div>
                  ))}
                </div>
              )}

              <div className="transcript-foot">
                <span className="t-status">
                  {liveSession ? <><span className="dot" />STREAMING</> : <>● COMPLETE</>}
                </span>
                <span className="t-actions">
                  <button>COPY</button>
                  <button>.TXT</button>
                  <button>.SRT</button>
                </span>
              </div>
            </div>
          )}
        </div>
      </div>

      <div className="deviceFoot">
        <span><b>SPACE</b> rec/pause · <b>S</b> stop · <b>F</b> files</span>
        <span>48k · 24bit</span>
      </div>

      <TweaksPanel>
        <TweakSection label="LCD" />
        <TweakColor
          label="Phosphor"
          value={LCD_PRESETS[t.lcd].fg}
          options={Object.values(LCD_PRESETS).map(p=>p.fg)}
          onChange={(v)=>{
            const key = Object.keys(LCD_PRESETS).find(k=>LCD_PRESETS[k].fg===v) || "green";
            setTweak("lcd", key);
          }}
        />
        <TweakSection label="Behavior" />
        <TweakToggle label="Open transcript on REC"
          value={t.autoOpenOnRec}
          onChange={(v)=>setTweak("autoOpenOnRec", v)} />
        <TweakSection label="Quick demo" />
        <TweakButton label={recState==="idle" ? "Start recording" : "Stop recording"}
          onClick={()=>recState==="idle" ? startRec() : stopRec()} />
        <TweakButton label={drawer==="closed" ? "Open files" : "Close drawer"}
          onClick={()=>setDrawer(d => d==="closed" ? "files" : "closed")} />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

</body>
</html>
